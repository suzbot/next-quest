<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "Courier New", Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      cursor: pointer;
      user-select: none;
      border: 1px solid #444;
      border-radius: 8px;
      overflow: hidden;
    }

    .message {
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .later-btn {
      background: #16213e;
      border: 1px solid #444;
      color: #888;
      font-family: inherit;
      font-size: 13px;
      padding: 4px 16px;
      cursor: pointer;
    }

    .later-btn:hover {
      border-color: #888;
      color: #e0e0e0;
    }
  </style>
</head>
<body onclick="openApp()">
  <div class="message">A quest awaits...</div>
  <button class="later-btn" onclick="event.stopPropagation(); maybeLater()">[Maybe Later]</button>

  <script>
    const { invoke } = window.__TAURI__.core;

    async function openApp() {
      await invoke("dismiss_overlay", { action: "open" });
    }

    async function maybeLater() {
      await invoke("dismiss_overlay", { action: "later" });
    }
  </script>
</body>
</html>
