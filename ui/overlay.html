<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 400;
      src: url('fonts/Silkscreen-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 700;
      src: url('fonts/Silkscreen-Bold.ttf') format('truetype');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b4b4b4;
      color: #111;
      font-family: 'Silkscreen', monospace;
      font-size: 13px;
      user-select: none;
      border: 2px solid #444;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #content {
      width: 100%;
      height: 100%;
    }

    /* Split layout */
    .split {
      display: flex;
      height: 100%;
    }

    .split-image {
      padding: 12px;
      display: flex;
      align-items: flex-start;
      padding-top: 16px;
    }

    .split-image img {
      image-rendering: pixelated;
      width: 140px;
      height: auto;
      border: 1px solid #888;
      outline: 1px solid #444;
    }

    .split-text {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .flavor {
      font-size: 10px;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.4;
      font-style: italic;
    }

    .quest-name {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .prompt {
      font-size: 9px;
      color: #555;
      margin-bottom: 6px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    button {
      background: #b4b4b4;
      border: 2px outset #ccc;
      color: #111;
      font-family: inherit;
      font-size: 9px;
      padding: 3px 10px;
      cursor: pointer;
      text-align: left;
      width: fit-content;
    }

    button:hover { background: #ccc; }
    button:active { border-style: inset; }

    .btn-hide {
    }

    .xp-flash {
      font-size: 10px;
      font-weight: 700;
      margin-top: 4px;
    }

    .level-up-text {
      font-size: 8px;
      font-weight: 700;
      margin-top: 2px;
    }

    .empty {
      color: #777;
      font-style: italic;
      font-size: 11px;
      padding: 20px;
      text-align: center;
    }

    @keyframes text-highlight {
      0% { color: #fff; }
      30% { color: #fff; }
      100% { color: #111; }
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(4px); }
      30% { opacity: 1; transform: translateY(0); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .pulsing { animation: text-highlight 1.5s ease-out; }
    .fading-in { animation: fade-in-up 1.5s ease-out; }
    #content.fading-out { animation: fade-out 0.4s ease-out forwards; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const content = document.getElementById("content");

    const diffTextColors = {
      "trivial": "#2244aa",
      "easy": "#1a6e1a",
      "moderate": "#7a5500",
      "challenging": "#992200",
      "epic": "#5c2d80",
    };

    const attrTextColors = {
      "Health": "#992200", "Pluck": "#7a5500", "Knowledge": "#2244aa",
      "Connection": "#1a6e1a", "Responsibility": "#5c2d80", "Character": "#333",
    };

    const skillAttrMap = {
      "Cooking": "Health", "Healing": "Health", "Acrobatics": "Health",
      "Cleaning": "Pluck", "Crafting": "Pluck", "Language": "Knowledge",
      "Nature": "Connection", "Community": "Connection", "Sociality": "Connection",
      "Bureaucracy": "Responsibility", "Animal Handling": "Responsibility", "Logistics": "Responsibility",
    };

    function levelUpColor(name) {
      return attrTextColors[name] || attrTextColors[skillAttrMap[name]] || "#333";
    }

    function levelUpHtml(levelUps) {
      if (!levelUps || levelUps.length === 0) return "";
      return levelUps.map(lu =>
        `<div class="level-up-text fading-in" style="color: ${levelUpColor(lu.name)}">${lu.name} reached Level ${lu.new_level}!</div>`
      ).join("");
    }

    const monsterImages = [
      "images/monsters/Bard 1 14 Atari.gif",
      "images/monsters/Bard 1 15 Atari.gif",
      "images/monsters/Bard 1 19 Atari.gif",
      "images/monsters/Bard 1 20 Atari.gif",
      "images/monsters/Bard 1 21 Atari.gif",
      "images/monsters/Bard 1 23 Atari.gif",
      "images/monsters/Bard 1 25 Atari.gif",
      "images/monsters/Bard 1 27 Atari.gif",
      "images/monsters/Bard 1 29 Atari.gif",
      "images/monsters/Bard 1 33 Amiga.gif",
      "images/monsters/Bard 1 34 Atari.gif",
      "images/monsters/Bard 1 35 Atari.gif",
      "images/monsters/Bard 1 40 Atari.gif",
      "images/monsters/Bard 1 41 Atari.gif",
      "images/monsters/Bard 1 42 Atari.gif",
      "images/monsters/Bard 1 51 Atari.gif",
    ];

    let encounterLines = [
      "A trial lays before you...",
    ];

    async function loadTextPool() {
      try {
        const text = await fetch("text/encounter-lines.txt").then(r => r.text());
        const lines = text.split("\n").map(l => l.trim()).filter(l => l);
        if (lines.length > 0) encounterLines = lines;
      } catch (e) {
        console.error("Failed to load encounter lines:", e);
      }
    }

    function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    let skipCount = 0;
    let currentQuest = null;
    let currentMonster = randomFrom(monsterImages);
    let currentEncounter = randomFrom(encounterLines);

    async function loadQuest() {
      currentQuest = await invoke("get_next_quest", { skipCount });
      currentMonster = randomFrom(monsterImages);
      currentEncounter = randomFrom(encounterLines);
      render();
    }

    function render() {
      if (!currentQuest) {
        content.innerHTML = `
          <div class="empty">All caught up. Rest well, adventurer.</div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="split">
          <div class="split-image">
            <img src="${currentMonster}" alt="Monster">
          </div>
          <div class="split-text">
            <div class="flavor">${currentEncounter}</div>
            <div class="quest-name">${escapeHtml(currentQuest.title)}</div>
            <div class="prompt">Do you...</div>
            <div class="actions">
              <button onclick="questNow()"><u>F</u>ight</button>
              <button onclick="somethingElse()"><u>R</u>un</button>
              <button onclick="questDone()"><u>C</u>ast Completion</button>
              <button class="btn-hide" onclick="maybeLater()"><u>H</u>ide in the Shadows</button>
            </div>
          </div>
        </div>
      `;
    }

    async function questDone() {
      if (!currentQuest) return;
      const difficulty = currentQuest.difficulty;
      const completion = await invoke("complete_quest", { questId: currentQuest.id });
      const color = diffTextColors[difficulty] || "#1a6e1a";

      let textHtml = `<div class="quest-name pulsing">${escapeHtml(completion.quest_title)}</div>`;
      if (completion.xp_earned > 0) {
        textHtml += `<div class="xp-flash fading-in" style="color: ${color}">+${completion.xp_earned} XP</div>`;
      }
      textHtml += levelUpHtml(completion.level_ups);

      content.innerHTML = `
        <div class="split">
          <div class="split-image">
            <img src="${currentMonster}" alt="Monster">
          </div>
          <div class="split-text">${textHtml}</div>
        </div>
      `;

      skipCount = 0;
      setTimeout(() => {
        content.classList.add("fading-out");
        setTimeout(() => {
          content.classList.remove("fading-out");
          loadQuest();
        }, 400);
      }, 2500);
    }

    async function questNow() {
      if (!currentQuest) return;
      await invoke("start_timer", { questId: currentQuest.id, monsterImage: currentMonster, encounterLine: currentEncounter });
      await invoke("dismiss_overlay", { action: "quest_now" });
    }

    function somethingElse() {
      skipCount++;
      loadQuest();
    }

    async function maybeLater() {
      await invoke("dismiss_overlay", { action: "later" });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "f") questNow();
      else if (key === "r") somethingElse();
      else if (key === "c") questDone();
      else if (key === "h") maybeLater();
    });

    window.__TAURI__.event.listen("overlay-refresh", () => {
      skipCount = 0;
      loadQuest();
    });

    loadTextPool().then(() => loadQuest());
  </script>
</body>
</html>
