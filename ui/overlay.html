<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 400;
      src: url('fonts/Silkscreen-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 700;
      src: url('fonts/Silkscreen-Bold.ttf') format('truetype');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b4b4b4;
      color: #111;
      font-family: 'Silkscreen', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      border: 2px solid #444;
      overflow: hidden;
      padding: 16px;
    }

    .flavor {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 8px;
    }

    .quest-name {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 14px;
      text-align: center;
      line-height: 1.3;
    }

    .actions {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    button {
      background: #b4b4b4;
      border: 2px outset #ccc;
      color: #111;
      font-family: inherit;
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
    }

    button:hover { background: #ccc; }
    button:active { border-style: inset; }

    .later-btn {
      color: #555;
      font-size: 9px;
    }

    .xp-flash {
      font-size: 11px;
      color: #1a6e1a;
      font-weight: 700;
      margin-top: 4px;
      min-height: 14px;
    }

    .empty {
      color: #777;
      font-style: italic;
      font-size: 12px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div id="content"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const content = document.getElementById("content");

    let skipCount = 0;
    let currentQuest = null;

    async function loadQuest() {
      currentQuest = await invoke("get_next_quest", { skipCount });
      render();
    }

    function render() {
      if (!currentQuest) {
        content.innerHTML = `
          <div class="empty">All caught up. Rest well, adventurer.</div>
          <button class="later-btn" onclick="maybeLater()">Maybe Later</button>
        `;
        return;
      }

      content.innerHTML = `
        <div class="flavor">A quest awaits...</div>
        <div class="quest-name">${escapeHtml(currentQuest.title)}</div>
        <div class="actions">
          <button onclick="questDone()">Done</button>
          <button onclick="questNow()">Quest Now</button>
          <button onclick="somethingElse()">Something Else</button>
        </div>
        <button class="later-btn" onclick="maybeLater()">Maybe Later</button>
        <div class="xp-flash" id="xp-flash"></div>
      `;
    }

    async function questDone() {
      if (!currentQuest) return;
      const completion = await invoke("complete_quest", { questId: currentQuest.id });

      if (completion.xp_earned > 0) {
        const flash = document.getElementById("xp-flash");
        if (flash) flash.textContent = `+${completion.xp_earned} XP`;
      }

      skipCount = 0;
      setTimeout(() => loadQuest(), 800);
    }

    async function questNow() {
      if (!currentQuest) return;
      await invoke("start_timer", { questId: currentQuest.id });
      await invoke("dismiss_overlay", { action: "quest_now" });
    }

    function somethingElse() {
      skipCount++;
      loadQuest();
    }

    async function maybeLater() {
      await invoke("dismiss_overlay", { action: "later" });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // Refresh when overlay is re-shown
    window.__TAURI__.event.listen("overlay-refresh", () => {
      skipCount = 0;
      loadQuest();
    });

    loadQuest();
  </script>
</body>
</html>
