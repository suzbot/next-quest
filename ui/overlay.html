<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 400;
      src: url('fonts/Silkscreen-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 700;
      src: url('fonts/Silkscreen-Bold.ttf') format('truetype');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b4b4b4;
      color: #111;
      font-family: 'Silkscreen', monospace;
      font-size: 13px;
      user-select: none;
      border: 2px solid #444;
      overflow: hidden;
    }

    #content {
      width: 100%;
    }

    /* Split layout */
    .split {
      display: flex;
    }

    .split-image {
      padding: 12px;
      display: flex;
      align-items: flex-start;
      padding-top: 16px;
    }

    .split-image img {
      image-rendering: pixelated;
      width: 140px;
      height: auto;
      border: 1px solid #888;
      outline: 1px solid #444;
    }

    .split-text {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .flavor {
      font-size: 10px;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.4;
      font-style: italic;
    }

    .quest-name {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .prompt {
      font-size: 9px;
      color: #555;
      margin-bottom: 6px;
    }

    .actions {
      display: grid;
      grid-template-columns: auto auto;
      gap: 3px;
      justify-content: start;
    }

    button {
      background: #b4b4b4;
      border: 2px outset #ccc;
      color: #111;
      font-family: inherit;
      font-size: 9px;
      padding: 3px 10px;
      cursor: pointer;
      text-align: left;
      width: fit-content;
    }

    button:hover { background: #ccc; }
    button:active { border-style: inset; }

    .xp-flash {
      font-size: 10px;
      font-weight: 700;
      margin-top: 4px;
    }

    .level-up-text {
      font-size: 8px;
      font-weight: 700;
      margin-top: 2px;
    }

    .empty {
      color: #777;
      font-style: italic;
      font-size: 11px;
      padding: 20px;
      text-align: center;
    }

    @keyframes text-highlight {
      0% { color: #fff; }
      30% { color: #fff; }
      100% { color: #111; }
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(4px); }
      30% { opacity: 1; transform: translateY(0); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .pulsing { animation: text-highlight 1.5s ease-out; }
    .fading-in { animation: fade-in-up 1.5s ease-out; }
    #content.fading-out { animation: fade-out 0.4s ease-out forwards; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const content = document.getElementById("content");
    const overlayWindow = window.__TAURI__.window.getCurrentWindow();
    const OVERLAY_WIDTH = 460;

    async function resizeToFit() {
      // Wait for all images to load so their height is included
      const images = content.querySelectorAll("img");
      await Promise.all(Array.from(images).map(img =>
        img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
      ));
      await new Promise(r => requestAnimationFrame(r));
      const height = content.offsetHeight + 4; // +4 for body border
      await overlayWindow.setSize(new window.__TAURI__.window.LogicalSize(OVERLAY_WIDTH, height));
    }

    const diffTextColors = {
      "trivial": "#2244aa",
      "easy": "#1a6e1a",
      "moderate": "#7a5500",
      "challenging": "#992200",
      "epic": "#5c2d80",
    };

    const attrTextColors = {
      "Health": "#992200", "Pluck": "#7a5500", "Knowledge": "#2244aa",
      "Connection": "#1a6e1a", "Responsibility": "#5c2d80", "Character": "#333",
    };

    let skillAttrMap = {};

    async function loadSkillAttrMap() {
      const [skills, attributes] = await Promise.all([
        invoke("get_skills"),
        invoke("get_attributes"),
      ]);
      const attrNameById = {};
      attributes.forEach(a => { attrNameById[a.id] = a.name; });
      skills.forEach(s => { skillAttrMap[s.name] = attrNameById[s.attribute_id] || ""; });
    }

    function levelUpColor(name) {
      return attrTextColors[name] || attrTextColors[skillAttrMap[name]] || "#333";
    }

    function levelUpHtml(levelUps) {
      if (!levelUps || levelUps.length === 0) return "";
      return levelUps.map(lu =>
        `<div class="level-up-text fading-in" style="color: ${levelUpColor(lu.name)}">${lu.name} reached Level ${lu.new_level}!</div>`
      ).join("");
    }

    let monsterImages = [];

    let encounterLines = [
      "A trial lays before you...",
    ];

    async function loadPools() {
      try {
        const [encText, manifest] = await Promise.all([
          fetch("text/encounter-lines.txt").then(r => r.text()),
          fetch("images/manifest.json").then(r => r.json()),
        ]);
        const lines = encText.split("\n").map(l => l.trim()).filter(l => l);
        if (lines.length > 0) encounterLines = lines;
        monsterImages = manifest["monsters"] || [];
      } catch (e) {
        console.error("Failed to load pools:", e);
      }
    }

    function randomFromExcluding(arr, previous) {
      if (!arr || arr.length === 0) return null;
      if (arr.length === 1) return arr[0];
      let pick;
      do { pick = arr[Math.floor(Math.random() * arr.length)]; }
      while (pick === previous);
      return pick;
    }

    let currentResult = null; // ScoredQuest from backend
    let currentMonster = null;
    let currentEncounter = null;

    async function loadQuest() {
      currentResult = await invoke("get_next_quest", {});
      currentMonster = randomFromExcluding(monsterImages, currentMonster);
      currentEncounter = randomFromExcluding(encounterLines, currentEncounter);
      render();
    }

    function render() {
      if (!currentResult) {
        content.innerHTML = `
          <div class="empty">All caught up. Rest well, adventurer.</div>
        `;
        resizeToFit();
        return;
      }

      const quest = currentResult.quest;
      content.innerHTML = `
        <div class="split">
          <div class="split-image">
            <img src="${currentMonster}" alt="Monster">
          </div>
          <div class="split-text">
            <div class="flavor">${currentEncounter}</div>
            <div class="quest-name">${escapeHtml(quest.title)}</div>
            <div class="prompt">Do you...</div>
            <div class="actions">
              <button onclick="questNow()"><u>F</u>ight</button>
              <button onclick="questDone()"><u>C</u>ast Completion</button>
              <button onclick="somethingElse()"><u>R</u>un</button>
              <button onclick="maybeLater()"><u>H</u>ide in the Shadows</button>
            </div>
          </div>
        </div>
      `;
      resizeToFit();
    }

    async function questDone() {
      if (!currentResult) return;
      const quest = currentResult.quest;
      const difficulty = quest.difficulty;
      const completion = await invoke("complete_quest", { questId: quest.id });
      const color = diffTextColors[difficulty] || "#1a6e1a";

      let textHtml = `<div class="quest-name pulsing">${escapeHtml(completion.quest_title)}</div>`;
      if (completion.xp_earned > 0) {
        textHtml += `<div class="xp-flash fading-in" style="color: ${color}">+${completion.xp_earned} XP</div>`;
      }
      textHtml += levelUpHtml(completion.level_ups);

      content.innerHTML = `
        <div class="split">
          <div class="split-image">
            <img src="${currentMonster}" alt="Monster">
          </div>
          <div class="split-text">${textHtml}</div>
        </div>
      `;
      resizeToFit();

      setTimeout(() => {
        content.classList.add("fading-out");
        setTimeout(() => {
          content.classList.remove("fading-out");
          loadQuest();
        }, 400);
      }, 2500);
    }

    async function questNow() {
      if (!currentResult) return;
      const quest = currentResult.quest;
      await invoke("start_timer", { questId: quest.id, monsterImage: currentMonster, encounterLine: currentEncounter });
      await invoke("dismiss_overlay", { action: "quest_now" });
    }

    async function somethingElse() {
      if (currentResult) {
        const questId = currentResult.quest.id;
        await invoke("skip_quest", { questId });
        currentResult = await invoke("get_next_quest", { excludeQuestId: questId });
      } else {
        currentResult = await invoke("get_next_quest", {});
      }
      currentMonster = randomFromExcluding(monsterImages, currentMonster);
      currentEncounter = randomFromExcluding(encounterLines, currentEncounter);
      render();
    }

    async function maybeLater() {
      // Hide does NOT count as a skip
      await invoke("dismiss_overlay", { action: "later" });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "f") questNow();
      else if (key === "r") somethingElse();
      else if (key === "c") questDone();
      else if (key === "h") maybeLater();
    });

    window.__TAURI__.event.listen("overlay-refresh", () => {
      loadQuest();
    });

    Promise.all([loadPools(), loadSkillAttrMap()]).then(() => loadQuest());
  </script>
</body>
</html>
