<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 400;
      src: url('fonts/Silkscreen-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 700;
      src: url('fonts/Silkscreen-Bold.ttf') format('truetype');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b4b4b4;
      color: #111;
      font-family: 'Silkscreen', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      border: 2px solid #444;
      overflow: hidden;
      padding: 16px;
    }

    .flavor {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 8px;
    }

    .quest-name {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 14px;
      text-align: center;
      line-height: 1.3;
    }

    .actions {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    button {
      background: #b4b4b4;
      border: 2px outset #ccc;
      color: #111;
      font-family: inherit;
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
    }

    button:hover { background: #ccc; }
    button:active { border-style: inset; }

    .later-btn {
      color: #555;
      font-size: 9px;
    }

    .xp-flash {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
      min-height: 14px;
    }

    .level-up-text {
      font-size: 9px;
      font-weight: 700;
      margin-top: 3px;
    }

    .empty {
      color: #777;
      font-style: italic;
      font-size: 12px;
      margin-bottom: 14px;
    }

    @keyframes text-pulse {
      0% { transform: scale(1); opacity: 0.7; }
      15% { transform: scale(1.15); opacity: 1; }
      70% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(4px); }
      30% { opacity: 1; transform: translateY(0); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .pulsing { animation: text-pulse 2s ease-in-out; }
    .fading-in { animation: fade-in-up 1.5s ease-out; }
    #content.fading-out { animation: fade-out 0.4s ease-out forwards; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const content = document.getElementById("content");

    const diffTextColors = {
      "trivial": "#2244aa",
      "easy": "#1a6e1a",
      "moderate": "#7a5500",
      "challenging": "#992200",
      "epic": "#5c2d80",
    };

    const attrTextColors = {
      "Health": "#992200", "Pluck": "#7a5500", "Knowledge": "#2244aa",
      "Connection": "#1a6e1a", "Responsibility": "#5c2d80", "Character": "#333",
    };

    const skillAttrMap = {
      "Cooking": "Health", "Healing": "Health", "Acrobatics": "Health",
      "Cleaning": "Pluck", "Crafting": "Pluck", "Language": "Knowledge",
      "Nature": "Connection", "Community": "Connection", "Sociality": "Connection",
      "Bureaucracy": "Responsibility", "Animal Handling": "Responsibility", "Logistics": "Responsibility",
    };

    function levelUpColor(name) {
      return attrTextColors[name] || attrTextColors[skillAttrMap[name]] || "#333";
    }

    function levelUpHtml(levelUps) {
      if (!levelUps || levelUps.length === 0) return "";
      return levelUps.map(lu =>
        `<div class="level-up-text fading-in" style="color: ${levelUpColor(lu.name)}">${lu.name} reached Level ${lu.new_level}!</div>`
      ).join("");
    }

    let skipCount = 0;
    let currentQuest = null;

    async function loadQuest() {
      currentQuest = await invoke("get_next_quest", { skipCount });
      render();
    }

    function render() {
      if (!currentQuest) {
        content.innerHTML = `
          <div class="empty">All caught up. Rest well, adventurer.</div>
          <button class="later-btn" onclick="maybeLater()">Maybe Later</button>
        `;
        return;
      }

      content.innerHTML = `
        <div class="flavor">A quest awaits...</div>
        <div class="quest-name">${escapeHtml(currentQuest.title)}</div>
        <div class="actions">
          <button onclick="questDone()">Done</button>
          <button onclick="questNow()">Quest Now</button>
          <button onclick="somethingElse()">Something Else</button>
        </div>
        <button class="later-btn" onclick="maybeLater()">Maybe Later</button>
      `;
    }

    async function questDone() {
      if (!currentQuest) return;
      const difficulty = currentQuest.difficulty;
      const completion = await invoke("complete_quest", { questId: currentQuest.id });
      const color = diffTextColors[difficulty] || "#1a6e1a";

      // Show completion feedback
      let feedbackHtml = `<div class="quest-name pulsing">${escapeHtml(completion.quest_title)}</div>`;
      if (completion.xp_earned > 0) {
        feedbackHtml += `<div class="xp-flash fading-in" style="color: ${color}">+${completion.xp_earned} XP</div>`;
      }
      feedbackHtml += levelUpHtml(completion.level_ups);
      content.innerHTML = feedbackHtml;

      // Hold, fade out, show next quest
      skipCount = 0;
      setTimeout(() => {
        content.classList.add("fading-out");
        setTimeout(() => {
          content.classList.remove("fading-out");
          loadQuest();
        }, 400);
      }, 2500);
    }

    async function questNow() {
      if (!currentQuest) return;
      await invoke("start_timer", { questId: currentQuest.id });
      await invoke("dismiss_overlay", { action: "quest_now" });
    }

    function somethingElse() {
      skipCount++;
      loadQuest();
    }

    async function maybeLater() {
      await invoke("dismiss_overlay", { action: "later" });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    window.__TAURI__.event.listen("overlay-refresh", () => {
      skipCount = 0;
      loadQuest();
    });

    loadQuest();
  </script>
</body>
</html>
