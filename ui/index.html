    function deleteWithConfirm(btn, type, id) {
      if (btn.dataset.confirming) {
        btn.dataset.confirming = "";
        const command = type === "attr" ? "delete_attribute" : "delete_skill";
        invoke(command, { id }).then(() => {
          editingAttrId = null;
          editingSkillId = null;
          loadCharacterView();
          loadAll(); // refresh quest links
        });
        return;
      }
      btn.dataset.confirming = "true";
      btn.dataset.original = btn.textContent;
      btn.textContent = "Sure?";
      btn.classList.add("confirm");
      setTimeout(() => {
        if (btn.dataset.confirming) {
          btn.dataset.confirming = "";
          btn.textContent = btn.dataset.original;
          btn.classList.remove("confirm");
        }
      }, 2000);
    }

    // --- Sagas ---

    let cachedSagas = [];
    let sagaSteps = {}; // saga_id -> steps array
    let editingSagaId = null;
    let expandedSagaId = null;
    let editingStepId = null;
    let sagaFlashActive = false;

    async function loadSagas() {
      cachedSagas = await invoke("get_sagas_with_progress");
      // Load steps for expanded saga
      if (expandedSagaId) {
        sagaSteps[expandedSagaId] = await invoke("get_saga_steps", { sagaId: expandedSagaId });
      }
      renderSagas();
    }

    function renderSagas() {
      if (sagaFlashActive) return; // Don't re-render during XP flash
      if (cachedSagas.length === 0) {
        sagaList.innerHTML = '<li class="empty-state">No sagas yet. Add one above.</li>';
        return;
      }
      sagaList.innerHTML = cachedSagas.map(sp => {
        const s = sp.saga;
        if (editingSagaId === s.id) return renderSagaEdit(s);
        const cycleText = s.cycle_days ? `↻ ${s.cycle_days}d` : "One-off";
        const isExpanded = expandedSagaId === s.id;
        const toggle = `<span class="expand-toggle" onclick="toggleSagaExpand('${s.id}')">${isExpanded ? '▾' : '▸'}</span>`;
        const stateClass = sp.is_due ? "quest-due" : "quest-cooldown";
        const allDone = sp.is_due && sp.total_steps > 0 && sp.completed_steps >= sp.total_steps;
        const pct = sp.total_steps > 0 ? Math.round((sp.completed_steps / sp.total_steps) * 100) : 0;
        const progressText = allDone ? "Done" : `${sp.completed_steps}/${sp.total_steps}`;
        const lastRun = s.last_run_completed_at ? formatTimestamp(s.last_run_completed_at) : "";
        let html = `<li class="quest-item ${stateClass}" data-id="${s.id}">
          <div class="quest-row-top">
            ${toggle}
            <span class="quest-title" onclick="startSagaEdit('${s.id}')">${escapeHtml(s.name)}</span>
            <span class="saga-progress">
              <span class="saga-progress-bar"><span class="saga-progress-fill" style="width: ${pct}%"></span></span>
              <span class="saga-progress-text">(${progressText})</span>
            </span>
            <span class="quest-meta">
              <span class="meta-cycle">${cycleText}</span>
            </span>
            ${lastRun ? `<span class="quest-last-done">${lastRun}</span>` : ''}
          </div>`;
        if (isExpanded) {
          html += renderSagaSteps(s, sp);
        }
        html += `</li>`;
        return html;
      }).join("");

      if (editingSagaId) {
        const el = document.getElementById("saga-edit-name");
        if (el) el.focus();
      }
      if (editingStepId) {
        const el = document.getElementById("step-edit-title");
        if (el) el.focus();
        // Init TOD/DOW for step edit
        const steps = expandedSagaId ? (sagaSteps[expandedSagaId] || []) : [];
        const editStep = steps.find(s => s.id === editingStepId);
        if (editStep) {
          const etod = document.getElementById("step-edit-tod");
          const edow = document.getElementById("step-edit-dow");
          if (etod) renderCheckDropdown(etod, editStep.time_of_day ?? 15, TOD_FULL, todSummary);
          if (edow) renderCheckDropdown(edow, editStep.days_of_week ?? 127, DOW_FULL, dowSummary);
        }
      }
      // Initialize step add form controls
      if (expandedSagaId) {
        const stepLinksRow = document.getElementById("step-add-links-" + expandedSagaId);
        if (stepLinksRow && !stepLinksRow.innerHTML) stepLinksRow.innerHTML = renderLinkTagsHtml("step-add", [], []);
        const todEl = document.getElementById("step-tod-" + expandedSagaId);
        const dowEl = document.getElementById("step-dow-" + expandedSagaId);
        if (todEl && !todEl.hasChildNodes()) renderCheckDropdown(todEl, 15, TOD_FULL, todSummary);
        if (dowEl && !dowEl.hasChildNodes()) renderCheckDropdown(dowEl, 127, DOW_FULL, dowSummary);
      }
    }

    function renderSagaSteps(saga, sagaProgress) {
      const steps = sagaSteps[saga.id] || [];
      const runStart = saga.last_run_completed_at || saga.created_at;
      let html = '<div class="saga-steps">';

      // Add step form
      html += `<form class="saga-step-form" onsubmit="addSagaStep(event, '${saga.id}')">
        <input type="text" id="step-title-${saga.id}" placeholder="Step name...">
        <select id="step-diff-${saga.id}">
          <option value="trivial">Trivial</option>
          <option value="easy" selected>Easy</option>
          <option value="moderate">Fair</option>
          <option value="challenging">Hard</option>
          <option value="epic">Epic</option>
        </select>
        <select id="step-imp-${saga.id}" title="Importance">
          <option value="0" selected>—</option>
          <option value="1">!</option>
          <option value="2">!!</option>
          <option value="3">!!!</option>
          <option value="4">!!!!</option>
          <option value="5">!!!!!</option>
        </select>
        <span id="step-tod-${saga.id}" class="dow-dropdown"></span>
        <span id="step-dow-${saga.id}" class="dow-dropdown"></span>
        <button type="button" onclick="toggleStepAddLinks('${saga.id}')">Tags</button>
        <button type="submit">Add Step</button>
      </form>
      <div id="step-add-links-${saga.id}" class="hidden" style="padding: 2px 0;"></div>`;

      if (steps.length === 0) {
        html += '<div class="empty-state" style="padding: 4px 20px; font-size: 10px;">No steps yet.</div>';
      } else {
        html += '<ul class="step-list">';
        steps.forEach((step, i) => {
          if (editingStepId === step.id) {
            html += renderStepEdit(step, saga.id);
          } else {
            const completedThisRun = step.last_completed && step.last_completed > runStart;
            const stepClass = completedThisRun ? "quest-cooldown" : (sagaProgress.is_due ? "quest-due" : "quest-cooldown");
            const diffColor = sagaProgress.is_due && !completedThisRun ? (diffTextColors[step.difficulty] || '#555') : '#777';
            const lastDone = step.last_completed ? formatTimestamp(step.last_completed) : "";
            const stepDow = dowText(step.days_of_week ?? 127);
            const stepTod = todText(step.time_of_day ?? 15);
            const stepLinks = linkNamesText(step);
            html += `<li class="quest-item step-item ${stepClass}" data-id="${step.id}" tabindex="0"
                        onkeydown="handleStepKey(event, '${step.id}', '${saga.id}')"
                        onpointerdown="onStepPointerDown(event, '${step.id}', '${saga.id}')">
              <div class="quest-row-top">
                <span class="expand-toggle" onclick="toggleDetail(this)">${stepLinks ? '▸' : ''}</span>
                <span class="step-number">${i + 1}.</span>
                <span class="quest-title" onclick="startStepEdit('${step.id}')">${escapeHtml(step.title)}</span>${step.importance > 0 ? `<span class="quest-importance">${"!".repeat(step.importance)}</span>` : ''}
                <span class="quest-meta">
                  <span class="meta-dow">${stepDow}</span>
                  <span class="meta-tod">${stepTod}</span>
                  <span class="meta-difficulty" style="color: ${diffColor}">${difficultyLabel(step.difficulty)}</span>
                </span>
                <span class="quest-last-done">${lastDone}</span>
                <button class="action-btn" onclick="sagaStepQuestNow('${step.id}')">⚔</button>
                <button class="action-btn done-btn" onclick="completeSagaStep('${step.id}', '${saga.id}')">✓</button>
              </div>
              ${stepLinks ? `<div class="quest-detail" style="display:none"><span class="quest-links">${escapeHtml(stepLinks)}</span></div>` : ''}
            </li>`;
          }
        });
        html += '</ul>';
      }
      html += '</div>';
      return html;
    }

    function renderStepEdit(step, sagaId) {
      const diff = step.difficulty;
      return `<li class="quest-edit step-item" data-id="${step.id}">
        <input type="text" id="step-edit-title" value="${escapeAttr(step.title)}"
               onkeydown="handleStepEditKey(event, '${step.id}', '${sagaId}')">
        <select id="step-edit-difficulty" onkeydown="handleStepEditKey(event, '${step.id}', '${sagaId}')">
          <option value="trivial" ${diff === "trivial" ? "selected" : ""}>Trivial</option>
          <option value="easy" ${diff === "easy" ? "selected" : ""}>Easy</option>
          <option value="moderate" ${diff === "moderate" ? "selected" : ""}>Fair</option>
          <option value="challenging" ${diff === "challenging" ? "selected" : ""}>Hard</option>
          <option value="epic" ${diff === "epic" ? "selected" : ""}>Epic</option>
        </select>
        <select id="step-edit-importance" onkeydown="handleStepEditKey(event, '${step.id}', '${sagaId}')">
          <option value="0" ${step.importance === 0 ? "selected" : ""}>—</option>
          <option value="1" ${step.importance === 1 ? "selected" : ""}>!</option>
          <option value="2" ${step.importance === 2 ? "selected" : ""}>!!</option>
          <option value="3" ${step.importance === 3 ? "selected" : ""}>!!!</option>
          <option value="4" ${step.importance === 4 ? "selected" : ""}>!!!!</option>
          <option value="5" ${step.importance === 5 ? "selected" : ""}>!!!!!</option>
        </select>
        <span id="step-edit-tod" class="dow-dropdown"></span>
        <span id="step-edit-dow" class="dow-dropdown"></span>
        <button onclick="saveStepEdit('${step.id}', '${sagaId}')">Save</button>
        <button class="del-btn" onclick="deleteStep('${step.id}', '${sagaId}')">Del</button>
        <span class="close-x" onclick="cancelStepEdit()">✕</span>
      </li>
      <li class="quest-edit-links" id="step-edit-links-container">
        ${renderLinkTagsHtml("step-edit", step.skill_ids || [], step.attribute_ids || [])}
      </li>`;
    }

    async function toggleSagaExpand(sagaId) {
      if (expandedSagaId === sagaId) {
        expandedSagaId = null;
      } else {
        expandedSagaId = sagaId;
        sagaSteps[sagaId] = await invoke("get_saga_steps", { sagaId });
      }
      renderSagas();
    }

    async function sagaStepQuestNow(questId) {
      // Same flow as listQuestNow — switch to quest giver, start timer
      currentMonsterImage = randomFromExcluding(monsterImages, currentMonsterImage);
      currentEncounterLine = randomFromExcluding(encounterLines, currentEncounterLine);
      await invoke("start_timer", { questId, monsterImage: currentMonsterImage, encounterLine: currentEncounterLine });
      timerStartLocal = Date.now();
      const timerState = await invoke("get_timer_state");
      timerTitleLocal = timerState.questTitle;
      timerInterval = setInterval(updateTimerDisplay, 1000);
      setTabsLocked(true);
      showView("quest-giver");
    }

    // --- Step resequencing ---

    let stepDraggedId = null;
    let stepDragSagaId = null;
    let stepDragStartY = 0;
    let stepIsDragging = false;

    function handleStepKey(e, stepId, sagaId) {
      if (e.key === "ArrowUp" && e.altKey) {
        e.preventDefault();
        e.stopPropagation();
        moveStep(stepId, sagaId, -1);
      } else if (e.key === "ArrowDown" && e.altKey) {
        e.preventDefault();
        e.stopPropagation();
        moveStep(stepId, sagaId, 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        focusAdjacentStep(stepId, sagaId, -1);
      } else if (e.key === "ArrowDown") {
        e.preventDefault();
        focusAdjacentStep(stepId, sagaId, 1);
      }
    }

    async function moveStep(stepId, sagaId, direction) {
      const steps = sagaSteps[sagaId] || [];
      const ids = steps.map(s => s.id);
      const idx = ids.indexOf(stepId);
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= ids.length) return;

      ids.splice(idx, 1);
      ids.splice(newIdx, 0, stepId);

      await invoke("reorder_saga_steps", { sagaId, stepIds: ids });
      sagaSteps[sagaId] = await invoke("get_saga_steps", { sagaId });
      renderSagas();
      const movedEl = sagaList.querySelector(`.step-item[data-id="${stepId}"]`);
      if (movedEl) movedEl.focus();
    }

    function focusAdjacentStep(stepId, sagaId, direction) {
      const stepItems = Array.from(sagaList.querySelectorAll(`.step-item[tabindex]`));
      const idx = stepItems.findIndex(el => el.dataset.id === stepId);
      const next = stepItems[idx + direction];
      if (next) next.focus();
    }

    function onStepPointerDown(e, stepId, sagaId) {
      if (e.target.closest("button")) return;
      if (e.target.closest(".expand-toggle")) return;
      e.stopPropagation();
      stepDraggedId = stepId;
      stepDragSagaId = sagaId;
      stepDragStartY = e.clientY;
      stepIsDragging = false;

      const onMove = (me) => {
        if (!stepIsDragging && Math.abs(me.clientY - stepDragStartY) > 5) {
          stepIsDragging = true;
          document.body.classList.add("is-dragging");
          window.getSelection()?.removeAllRanges();
          const el = sagaList.querySelector(`.step-item[data-id="${stepDraggedId}"]`);
          if (el) el.classList.add("dragging");
        }
        if (!stepIsDragging) return;

        clearStepDropIndicators();
        const target = getStepDropTarget(me.clientY);
        if (target && target.id !== stepDraggedId) {
          const rect = target.el.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          target.el.classList.add(me.clientY < mid ? "drop-above" : "drop-below");
        }
      };

      const onUp = async (ue) => {
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);

        if (!stepIsDragging) { stepDraggedId = null; return; }

        const target = getStepDropTarget(ue.clientY);
        clearStepDropIndicators();
        document.body.classList.remove("is-dragging");
        sagaList.querySelectorAll(".dragging").forEach(el => el.classList.remove("dragging"));

        if (!target || target.id === stepDraggedId) { stepDraggedId = null; return; }

        const steps = sagaSteps[stepDragSagaId] || [];
        const ids = steps.map(s => s.id);
        const draggedIdx = ids.indexOf(stepDraggedId);
        if (draggedIdx === -1) { stepDraggedId = null; return; }

        const rect = target.el.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        let targetIdx = ids.indexOf(target.id);
        if (ue.clientY >= mid && targetIdx < draggedIdx) targetIdx++;
        if (ue.clientY < mid && targetIdx > draggedIdx) targetIdx--;

        const reordered = [...ids];
        reordered.splice(draggedIdx, 1);
        reordered.splice(targetIdx, 0, stepDraggedId);

        await invoke("reorder_saga_steps", { sagaId: stepDragSagaId, stepIds: reordered });
        sagaSteps[stepDragSagaId] = await invoke("get_saga_steps", { sagaId: stepDragSagaId });
        stepDraggedId = null;
        stepIsDragging = false;
        renderSagas();
      };

      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    }

    function getStepDropTarget(clientY) {
      const items = Array.from(sagaList.querySelectorAll(".step-item:not(.quest-edit)"));
      for (const el of items) {
        const rect = el.getBoundingClientRect();
        if (clientY >= rect.top && clientY <= rect.bottom) {
          return { el, id: el.dataset.id };
        }
      }
      return null;
    }

    function clearStepDropIndicators() {
      sagaList.querySelectorAll(".drop-above, .drop-below").forEach(el => {
        el.classList.remove("drop-above", "drop-below");
      });
    }

    function toggleStepAddLinks(sagaId) {
      const row = document.getElementById("step-add-links-" + sagaId);
      if (row) row.classList.toggle("hidden");
    }

    async function addSagaStep(e, sagaId) {
      e.preventDefault();
      const titleEl = document.getElementById("step-title-" + sagaId);
      const diffEl = document.getElementById("step-diff-" + sagaId);
      const impEl = document.getElementById("step-imp-" + sagaId);
      const todEl = document.getElementById("step-tod-" + sagaId);
      const dowEl = document.getElementById("step-dow-" + sagaId);
      const title = titleEl.value.trim();
      if (!title) return;
      const importance = parseInt(impEl?.value, 10) || 0;
      const timeOfDay = todEl ? readMask(todEl) : 15;
      const daysOfWeek = dowEl ? readMask(dowEl) : 127;
      const step = await invoke("add_saga_step", { step: { sagaId, title, difficulty: diffEl.value, importance, timeOfDay, daysOfWeek } });

      const linksRow = document.getElementById("step-add-links-" + sagaId);
      if (linksRow) {
        const { skillIds, attributeIds } = getSelectedLinkIds(linksRow);
        if (skillIds.length > 0 || attributeIds.length > 0) {
          await invoke("set_quest_links", { questId: step.id, skillIds, attributeIds });
        }
      }

      titleEl.value = "";
      sagaSteps[sagaId] = await invoke("get_saga_steps", { sagaId });
      renderSagas();
      // Refocus after re-render
      const newTitleEl = document.getElementById("step-title-" + sagaId);
      if (newTitleEl) newTitleEl.focus();
    }

    function startStepEdit(id) {
      editingStepId = id;
      renderSagas();
    }

    function cancelStepEdit() {
      editingStepId = null;
      renderSagas();
    }

    function handleStepEditKey(e, id, sagaId) {
      if (e.key === "Enter") { e.preventDefault(); saveStepEdit(id, sagaId); }
      else if (e.key === "Escape") { e.preventDefault(); cancelStepEdit(); }
    }

    async function saveStepEdit(id, sagaId) {
      const title = document.getElementById("step-edit-title").value.trim();
      if (!title) return;
      const difficulty = document.getElementById("step-edit-difficulty").value;
      const todEl = document.getElementById("step-edit-tod");
      const dowEl = document.getElementById("step-edit-dow");
      const timeOfDay = todEl ? readMask(todEl) : 15;
      const daysOfWeek = dowEl ? readMask(dowEl) : 127;
      const importance = parseInt(document.getElementById("step-edit-importance")?.value, 10) || 0;
      await invoke("update_quest", { questId: id, update: { title, difficulty, importance, timeOfDay, daysOfWeek } });

      const linksContainer = document.getElementById("step-edit-links-container");
      if (linksContainer) {
        const { skillIds, attributeIds } = getSelectedLinkIds(linksContainer);
        await invoke("set_quest_links", { questId: id, skillIds, attributeIds });
      }
      editingStepId = null;
      if (expandedSagaId) {
        sagaSteps[expandedSagaId] = await invoke("get_saga_steps", { sagaId: expandedSagaId });
      }
      renderSagas();
    }

    async function deleteStep(id, sagaId) {
      await invoke("delete_quest", { questId: id });
      editingStepId = null;
      sagaSteps[sagaId] = await invoke("get_saga_steps", { sagaId });
      renderSagas();
    }

    async function completeSagaStep(questId, sagaId) {
      const step = (sagaSteps[sagaId] || []).find(s => s.id === questId);
      const completion = await invoke("complete_quest", { questId });

      // Immediately update progress bar in the DOM
      const sp = cachedSagas.find(sp => sp.saga.id === sagaId);
      if (sp) {
        const newCompleted = Math.min(sp.completed_steps + 1, sp.total_steps);
        const pct = sp.total_steps > 0 ? Math.round((newCompleted / sp.total_steps) * 100) : 0;
        const fill = sagaList.querySelector(`[data-id="${sagaId}"] .saga-progress-fill`);
        const text = sagaList.querySelector(`[data-id="${sagaId}"] .saga-progress-text`);
        if (fill) fill.style.width = pct + "%";
        if (text) text.textContent = `(${newCompleted}/${sp.total_steps})`;
      }

      sagaFlashActive = true;

      // Show XP feedback on the step row
      const row = sagaList.querySelector(`.step-item[data-id="${questId}"]`);
      if (row) {
        const color = diffTextColors[step?.difficulty] || "#1a6e1a";
        row.style.setProperty("--flash-color", color + "33");
        row.classList.add("flashing");

        const feedbackDiv = document.createElement("div");
        feedbackDiv.style.marginLeft = "4px";
        let feedbackHtml = "";
        if (completion.xp_earned > 0) {
          feedbackHtml += `<span class="xp-flash" style="color: ${color}">+${completion.xp_earned} XP</span>`;
        }
        if (completion.level_ups?.length > 0) {
          feedbackHtml += levelUpHtml(completion.level_ups);
        }
        feedbackDiv.innerHTML = feedbackHtml;
        row.querySelector(".quest-title")?.after(feedbackDiv);
      }

      // Defer saga completion check and full reload
      setTimeout(async () => {
        const result = await invoke("check_saga_completion", { sagaId });

        // Campaign progress
        let campaignResults = await invoke("check_campaign_progress", { targetType: "quest_completions", targetId: questId });
        if (result.completed) {
          const sagaCampaignResults = await invoke("check_campaign_progress", { targetType: "saga_completions", targetId: sagaId });
          campaignResults = campaignResults.concat(sagaCampaignResults);
        }

        if (result.completed) {
          // Show saga completion celebration
          const sagaRow = sagaList.querySelector(`[data-id="${sagaId}"]`);
          if (sagaRow) {
            let celebHtml = `<div class="saga-celebration pulsing">`;
            celebHtml += `<strong>${escapeHtml(result.sagaName)} complete!</strong>`;
            if (result.bonusXp > 0) {
              celebHtml += ` <span class="xp-flash" style="color: #7a5500">+${result.bonusXp} bonus XP</span>`;
            }
            if (result.levelUps?.length > 0) {
              celebHtml += levelUpHtml(result.levelUps);
            }
            celebHtml += `</div>`;
            celebHtml += campaignCelebrationHtml(campaignResults);
            sagaRow.insertAdjacentHTML("afterend", celebHtml);
          }
          // Hold celebration then reload
          setTimeout(async () => {
            sagaFlashActive = false;
            cachedSagas = await invoke("get_sagas_with_progress");
            sagaSteps[sagaId] = await invoke("get_saga_steps", { sagaId });
            renderSagas();
          }, 3000);
        } else {
          sagaFlashActive = false;
          cachedSagas = await invoke("get_sagas_with_progress");
          sagaSteps[sagaId] = await invoke("get_saga_steps", { sagaId });
          renderSagas();
        }
      }, 2500);
    }

    function renderSagaEdit(s) {
      const isRecurring = s.cycle_days !== null && s.cycle_days !== undefined;
      const cycleVal = s.cycle_days || 1;
      return `<li class="quest-edit" data-id="${s.id}">
        <input type="text" id="saga-edit-name" value="${escapeAttr(s.name)}"
               onkeydown="handleSagaEditKey(event, '${s.id}')">
        <select id="saga-edit-type" onchange="toggleSagaEditCycle()" onkeydown="handleSagaEditKey(event, '${s.id}')">
          <option value="recurring" ${isRecurring ? "selected" : ""}>Recurring</option>
          <option value="one_off" ${!isRecurring ? "selected" : ""}>One-off</option>
        </select>
        <label id="saga-edit-cycle-label" class="${isRecurring ? "" : "hidden"}">
          Days
          <input type="number" id="saga-edit-cycle" value="${cycleVal}" min="1" style="width: 55px;"
                 onkeydown="handleSagaEditKey(event, '${s.id}')">
        </label>
        <button onclick="saveSagaEdit('${s.id}')">Save</button>
        <button class="del-btn" onclick="deleteSaga('${s.id}')">Del</button>
        <span class="close-x" onclick="cancelSagaEdit()">✕</span>
      </li>`;
    }

    function startSagaEdit(id) {
      editingSagaId = id;
      renderSagas();
    }

    function cancelSagaEdit() {
      editingSagaId = null;
      renderSagas();
    }

    function handleSagaEditKey(e, id) {
      if (e.key === "Enter") { e.preventDefault(); saveSagaEdit(id); }
      else if (e.key === "Escape") { e.preventDefault(); cancelSagaEdit(); }
    }

    function toggleSagaCycleInput() {
      const sagaCycleLabel = document.getElementById("saga-cycle-label");
      sagaCycleLabel.classList.toggle("hidden", document.getElementById("saga-type").value === "one_off");
    }

    function toggleSagaEditCycle() {
      const label = document.getElementById("saga-edit-cycle-label");
      label.classList.toggle("hidden", document.getElementById("saga-edit-type").value === "one_off");
    }

    async function saveSagaEdit(id) {
      const name = document.getElementById("saga-edit-name").value.trim();
      if (!name) return;
      const sagaType = document.getElementById("saga-edit-type").value;
      const params = { sagaId: id, name, sagaType };
      if (sagaType === "recurring") {
        params.cycleDays = parseInt(document.getElementById("saga-edit-cycle").value, 10) || 1;
      }
      await invoke("update_saga", params);
      editingSagaId = null;
      await loadSagas();
    }

    async function deleteSaga(id) {
      await invoke("delete_saga", { sagaId: id });
      editingSagaId = null;
      await loadSagas();
    }

    sagaAddForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = sagaNameInput.value.trim();
      if (!name) return;
      const sagaType = document.getElementById("saga-type").value;
      const cycleDays = sagaType === "recurring"
        ? parseInt(sagaCycleInput.value, 10) || 1
        : null;
      await invoke("add_saga", { name, cycleDays });
      sagaNameInput.value = "";
      sagaCycleInput.value = "1";
      document.getElementById("saga-type").value = "recurring";
      toggleSagaCycleInput();
      sagaNameInput.focus();
      await loadSagas();
    });

    // --- Campaigns ---

    let cachedCampaigns = [];
    let expandedCampaignId = null;
    let editingCampaignId = null;
    let campaignDraftCriteria = []; // [{targetType, targetId, targetName, targetCount}]

    async function loadCampaigns() {
      cachedCampaigns = await invoke("get_campaigns");
      renderCampaigns();
    }

    function renderCampaigns() {
      if (cachedCampaigns.length === 0) {
        campaignList.innerHTML = '';
        return;
      }
      campaignList.innerHTML = cachedCampaigns.map(c => {
        if (editingCampaignId === c.id) return renderCampaignEdit(c);
        const isExpanded = expandedCampaignId === c.id;
        const toggle = `<span class="expand-toggle" onclick="toggleCampaignExpand('${c.id}')">${isExpanded ? '▾' : '▸'}</span>`;
        const isCompleted = !!c.completedAt;
        const stateClass = isCompleted ? "quest-cooldown" : "quest-due";
        const metCount = c.criteria.filter(cr => cr.currentCount >= cr.targetCount).length;
        const totalCount = c.criteria.length;
        const pct = totalCount > 0 ? Math.round((metCount / totalCount) * 100) : 0;
        const progressText = isCompleted ? "Done" : `${metCount}/${totalCount}`;
        let html = `<li class="quest-item ${stateClass}" data-id="${c.id}" tabindex="0"
                        onkeydown="handleCampaignKey(event, '${c.id}')">
          <div class="quest-row-top">
            ${toggle}
            <span class="quest-title" onclick="startCampaignEdit('${c.id}')">${escapeHtml(c.name)}</span>
            <span class="saga-progress">
              <span class="saga-progress-bar"><span class="saga-progress-fill" style="width: ${pct}%"></span></span>
              <span class="saga-progress-text">(${progressText})</span>
            </span>
          </div>`;
        if (isExpanded) {
          html += renderCampaignCriteria(c);
        }
        html += `</li>`;
        return html;
      }).join("");

      if (editingCampaignId) {
        const el = document.getElementById("campaign-edit-name");
        if (el) el.focus();
      }
    }

    function renderCampaignCriteria(campaign) {
      const criteria = campaign.criteria || [];
      if (criteria.length === 0) return '<div class="saga-steps"><div class="empty-state" style="padding: 4px 20px; font-size: 10px;">No criteria.</div></div>';
      let html = '<div class="saga-steps"><ul class="step-list">';
      criteria.forEach(cr => {
        const met = cr.currentCount >= cr.targetCount;
        const check = met ? '✓' : '○';
        const checkClass = met ? 'style="color: #4a4"' : 'style="color: #777"';
        html += `<li class="quest-item step-item ${met ? 'quest-cooldown' : 'quest-due'}" style="cursor: default;">
          <div class="quest-row-top">
            <span ${checkClass}>${check}</span>
            <span class="quest-title" style="cursor: default;">${escapeHtml(cr.targetName)}</span>
            <span class="saga-progress-text" style="margin-left: auto;">${cr.currentCount}/${cr.targetCount}</span>
          </div>
        </li>`;
      });
      html += '</ul></div>';
      return html;
    }

    function toggleCampaignExpand(campaignId) {
      expandedCampaignId = expandedCampaignId === campaignId ? null : campaignId;
      renderCampaigns();
    }

    function renderCampaignEdit(c) {
      return `<li class="quest-edit" data-id="${c.id}">
        <input type="text" id="campaign-edit-name" value="${escapeAttr(c.name)}"
               onkeydown="handleCampaignEditKey(event, '${c.id}')">
        <button onclick="saveCampaignEdit('${c.id}')">Save</button>
        <button onclick="duplicateCampaign('${c.id}')">Dup</button>
        <button class="del-btn" onclick="deleteCampaign('${c.id}')">Del</button>
        <span class="close-x" onclick="cancelCampaignEdit()">✕</span>
      </li>`;
    }

    function startCampaignEdit(id) {
      editingCampaignId = id;
      renderCampaigns();
    }

    function cancelCampaignEdit() {
      editingCampaignId = null;
      renderCampaigns();
    }

    function handleCampaignEditKey(e, id) {
      if (e.key === "Enter") { e.preventDefault(); saveCampaignEdit(id); }
      else if (e.key === "Escape") { e.preventDefault(); cancelCampaignEdit(); }
    }

    async function saveCampaignEdit(id) {
      const name = document.getElementById("campaign-edit-name").value.trim();
      if (!name) return;
      await invoke("rename_campaign", { id, name });
      editingCampaignId = null;
      await loadCampaigns();
    }

    async function deleteCampaign(id) {
      await invoke("delete_campaign", { id });
      editingCampaignId = null;
      if (expandedCampaignId === id) expandedCampaignId = null;
      await loadCampaigns();
    }

    async function duplicateCampaign(id) {
      const campaign = cachedCampaigns.find(c => c.id === id);
      if (!campaign) return;
      editingCampaignId = null;
      // Pre-fill criteria from the source campaign
      campaignDraftCriteria = campaign.criteria.map(cr => ({
        targetType: cr.targetType,
        targetId: cr.targetId,
        targetName: cr.targetName,
        targetCount: cr.targetCount,
      }));
      document.getElementById("campaign-form").classList.remove("hidden");
      document.getElementById("campaign-add-btn").classList.add("hidden");
      document.getElementById("campaign-name").value = campaign.name + " copy";
      document.getElementById("campaign-form-error").style.display = "none";
      document.getElementById("campaign-save-btn").disabled = false;
      await populateCampaignTargets();
      renderCampaignDraftCriteria();
      renderCampaigns();
      document.getElementById("campaign-name").focus();
    }

    function handleCampaignKey(e, campaignId) {
      if (e.key === "ArrowUp") {
        e.preventDefault();
        focusAdjacentCampaign(campaignId, -1);
      } else if (e.key === "ArrowDown") {
        e.preventDefault();
        focusAdjacentCampaign(campaignId, 1);
      } else if (e.key === "Enter" || e.key === "e" || e.key === "E") {
        e.preventDefault();
        startCampaignEdit(campaignId);
      } else if (e.key === " ") {
        e.preventDefault();
        toggleCampaignExpand(campaignId);
      }
    }

    function focusAdjacentCampaign(campaignId, direction) {
      const items = Array.from(campaignList.querySelectorAll('.quest-item[tabindex]'));
      const idx = items.findIndex(el => el.dataset.id === campaignId);
      const next = items[idx + direction];
      if (next) next.focus();
    }

    // --- Campaign creation form ---

    async function showCampaignForm() {
      campaignDraftCriteria = [];
      document.getElementById("campaign-form").classList.remove("hidden");
      document.getElementById("campaign-add-btn").classList.add("hidden");
      document.getElementById("campaign-name").value = "";
      document.getElementById("campaign-form-error").style.display = "none";
      document.getElementById("campaign-save-btn").disabled = true;
      // Populate target dropdown with quests and sagas
      await populateCampaignTargets();
      renderCampaignDraftCriteria();
      document.getElementById("campaign-name").focus();
    }

    function cancelCampaignForm() {
      campaignDraftCriteria = [];
      document.getElementById("campaign-form").classList.add("hidden");
      document.getElementById("campaign-add-btn").classList.remove("hidden");
    }

    async function populateCampaignTargets() {
      // Fetch fresh quest and saga lists
      const [quests, sagas] = await Promise.all([
        invoke("get_quests"),
        invoke("get_sagas"),
      ]);
      const select = document.getElementById("campaign-target-select");
      let html = '<option value="">-- Select --</option>';

      // Active quests (recurring + one-off that are still active)
      const activeQuests = quests.filter(q => q.active && !q.sagaId);
      if (activeQuests.length > 0) {
        html += '<optgroup label="Quests">';
        activeQuests.forEach(q => {
          html += `<option value="quest_completions:${q.id}">${escapeHtml(q.title)} (quest)</option>`;
        });
        html += '</optgroup>';
      }

      // Sagas
      if (sagas.length > 0) {
        html += '<optgroup label="Sagas">';
        sagas.forEach(s => {
          html += `<option value="saga_completions:${s.id}">${escapeHtml(s.name)} (saga)</option>`;
        });
        html += '</optgroup>';
      }

      select.innerHTML = html;
    }

    function addCampaignCriterion() {
      const select = document.getElementById("campaign-target-select");
      const countInput = document.getElementById("campaign-target-count");
      const errorEl = document.getElementById("campaign-form-error");
      const val = select.value;
      if (!val) return;

      const [targetType, targetId] = val.split(":");
      const targetName = select.options[select.selectedIndex].text.replace(/ \((quest|saga)\)$/, "");
      const targetCount = parseInt(countInput.value, 10) || 1;

      // Check for duplicate
      if (campaignDraftCriteria.some(c => c.targetType === targetType && c.targetId === targetId)) {
        errorEl.textContent = "That target is already added.";
        errorEl.style.display = "block";
        return;
      }

      errorEl.style.display = "none";
      campaignDraftCriteria.push({ targetType, targetId, targetName, targetCount });
      select.value = "";
      countInput.value = "1";
      renderCampaignDraftCriteria();
    }

    function removeCampaignCriterion(index) {
      campaignDraftCriteria.splice(index, 1);
      renderCampaignDraftCriteria();
    }

    function renderCampaignDraftCriteria() {
      const container = document.getElementById("campaign-criteria-list");
      const saveBtn = document.getElementById("campaign-save-btn");
      saveBtn.disabled = campaignDraftCriteria.length === 0;

      if (campaignDraftCriteria.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = campaignDraftCriteria.map((c, i) =>
        `<div style="display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 11px;">
          <span>${escapeHtml(c.targetName)}</span>
          <span style="color: #888;">×${c.targetCount}</span>
          <span class="close-x" onclick="removeCampaignCriterion(${i})" style="cursor: pointer; color: #c44;">✕</span>
        </div>`
      ).join("");
    }

    async function saveCampaign() {
      const name = document.getElementById("campaign-name").value.trim();
      const errorEl = document.getElementById("campaign-form-error");
      if (!name) {
        errorEl.textContent = "Campaign name is required.";
        errorEl.style.display = "block";
        return;
      }
      if (campaignDraftCriteria.length === 0) return;

      const criteria = campaignDraftCriteria.map(c => ({
        targetType: c.targetType,
        targetId: c.targetId,
        targetCount: c.targetCount,
      }));

      try {
        await invoke("create_campaign", { name, criteria });
        cancelCampaignForm();
        await loadCampaigns();
      } catch (e) {
        errorEl.textContent = String(e);
        errorEl.style.display = "block";
      }
    }

    // --- Settings ---

    function updateToggleLabels(enabled) {
      document.getElementById("cta-label-off").classList.toggle("active", !enabled);
      document.getElementById("cta-label-on").classList.toggle("active", enabled);
    }

    async function loadSettings() {
      const settings = await invoke("get_settings");
      document.getElementById("cta-interval").value = settings.ctaIntervalMinutes;
      document.getElementById("cta-toggle").checked = settings.callToAdventure;
      updateToggleLabels(settings.callToAdventure);
      debugScoring = settings.debugScoring;
      document.getElementById("debug-toggle").checked = debugScoring;
    }

    async function toggleDebugScoring() {
      debugScoring = document.getElementById("debug-toggle").checked;
      await invoke("set_debug_scoring", { enabled: debugScoring });
    }

    async function toggleCTA() {
      const newVal = await invoke("toggle_call_to_adventure");
      document.getElementById("cta-toggle").checked = newVal;
      updateToggleLabels(newVal);
    }

    async function saveCTAInterval() {
      const input = document.getElementById("cta-interval");
      const minutes = parseInt(input.value, 10);
      if (!minutes || minutes < 1) return;
      await invoke("set_cta_interval", { minutes });
    }

    function resetWithConfirm(btn, command, callback) {
      if (btn.dataset.confirming) {
        btn.dataset.confirming = "";
        invoke(command).then(() => callback());
        btn.textContent = btn.dataset.original;
        btn.classList.remove("confirm");
        return;
      }
      btn.dataset.confirming = "true";
      btn.dataset.original = btn.textContent;
      btn.textContent = "Sure?";
      btn.classList.add("confirm");
      setTimeout(() => {
        if (btn.dataset.confirming) {
          btn.dataset.confirming = "";
          btn.textContent = btn.dataset.original;
          btn.classList.remove("confirm");
        }
      }, 2000);
    }

    // On window focus: refresh settings, check if a timer was started externally
    window.addEventListener("focus", async () => {
      if (!settingsView.classList.contains("hidden")) loadSettings();

      // If a timer is running in the backend but not locally, sync up
      if (!timerInterval) {
        const timerState = await invoke("get_timer_state");
        if (timerState.active) {
          timerStartLocal = timerState.startedAt;
          timerTitleLocal = timerState.questTitle;
          if (timerState.monsterImage) currentMonsterImage = timerState.monsterImage;
          if (timerState.encounterLine) currentEncounterLine = timerState.encounterLine;
          timerInterval = setInterval(updateTimerDisplay, 1000);
          setTabsLocked(true);
          showView("quest-giver");
        }
      }
    });

    loadPools().then(() => loadAll());
    invoke("get_settings").then(s => { debugScoring = s.debugScoring; });
  </script>
</body>
</html>
