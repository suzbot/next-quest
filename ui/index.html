<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Quest</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      color: #c8c8c8;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 16px;
      color: #e0e0e0;
    }

    /* Add quest form */
    #add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    #add-form input[type="text"] {
      flex: 1;
      background: #16213e;
      border: 1px solid #444;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 8px;
    }

    #add-form input[type="number"] {
      width: 60px;
      background: #16213e;
      border: 1px solid #444;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 8px;
      text-align: center;
    }

    #add-form label {
      font-size: 12px;
      color: #888;
    }

    button {
      background: #16213e;
      border: 1px solid #444;
      color: #c8c8c8;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 12px;
      cursor: pointer;
    }

    button:hover,
    button:focus {
      border-color: #888;
      color: #fff;
      outline: none;
    }

    input:focus {
      border-color: #888;
      outline: none;
    }

    /* Quest list */
    #quest-list {
      list-style: none;
    }

    .quest-item {
      padding: 6px 8px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quest-title {
      flex: 1;
    }

    .quest-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
    }

    /* Visual states */
    .quest-due .quest-title {
      color: #e0e0e0;
    }

    .quest-completed .quest-title {
      color: #555;
    }

    .quest-done-oneoff .quest-title {
      text-decoration: line-through;
      color: #555;
    }

    .quest-done-oneoff button {
      visibility: hidden;
    }

    .empty-state {
      color: #555;
      font-style: italic;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <h1>Next Quest</h1>

  <form id="add-form">
    <input type="text" id="quest-title" placeholder="Quest name..." autofocus>
    <label>
      Days
      <input type="number" id="quest-cycle" value="1" min="0">
    </label>
    <button type="submit">Add</button>
  </form>

  <ul id="quest-list"></ul>

  <script>
    const { invoke } = window.__TAURI__.core;

    const questList = document.getElementById("quest-list");
    const addForm = document.getElementById("add-form");
    const titleInput = document.getElementById("quest-title");
    const cycleInput = document.getElementById("quest-cycle");

    async function loadQuests() {
      const quests = await invoke("get_quests");
      renderQuests(quests);
    }

    function renderQuests(quests) {
      if (quests.length === 0) {
        questList.innerHTML = '<li class="empty-state">No quests yet. Add one above.</li>';
        return;
      }

      questList.innerHTML = quests
        .map(q => {
          const cycleText = q.cycle_days
            ? `Every ${q.cycle_days} day${q.cycle_days !== 1 ? "s" : ""}`
            : "One-off";

          // Determine visual state class
          let stateClass;
          if (!q.active && q.cycle_days === null) {
            stateClass = "quest-done-oneoff";
          } else if (q.is_due) {
            stateClass = "quest-due";
          } else {
            stateClass = "quest-completed";
          }

          const lastDone = q.last_completed
            ? formatTimestamp(q.last_completed)
            : "";

          return `<li class="quest-item ${stateClass}" data-id="${q.id}">
            <button class="done-btn" onclick="completeQuest('${q.id}')">[Done]</button>
            <span class="quest-title">${escapeHtml(q.title)}</span>
            <span class="quest-meta">
              <span class="quest-cycle">${cycleText}</span>
              ${lastDone ? `<span class="quest-last-done">${lastDone}</span>` : ""}
            </span>
          </li>`;
        })
        .join("");
    }

    async function completeQuest(id) {
      await invoke("complete_quest", { questId: id });
      await loadQuests();
    }

    addForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = titleInput.value.trim();
      if (!title) return;

      const cycleDays = parseInt(cycleInput.value, 10);
      const cycle_days = cycleDays > 0 ? cycleDays : null;

      await invoke("add_quest", { title, cycleDays: cycle_days });
      titleInput.value = "";
      titleInput.focus();
      await loadQuests();
    });

    function formatTimestamp(iso) {
      const d = new Date(iso);
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hours = String(d.getHours()).padStart(2, "0");
      const mins = String(d.getMinutes()).padStart(2, "0");
      return `${month}/${day} ${hours}:${mins}`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    loadQuests();
  </script>
</body>
</html>
