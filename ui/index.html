<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Quest</title>
  <style>
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 400;
      src: url('fonts/Silkscreen-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 700;
      src: url('fonts/Silkscreen-Bold.ttf') format('truetype');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b4b4b4;
      color: #111;
      font-family: 'Silkscreen', monospace;
      font-size: 13px;
      padding: 0;
    }

    .app-border {
      background:
        repeating-linear-gradient(45deg, transparent, transparent 4px, #9a9a9a 4px, #9a9a9a 5px),
        repeating-linear-gradient(-45deg, transparent, transparent 4px, #9a9a9a 4px, #9a9a9a 5px);
      background-color: #b4b4b4;
      padding: 10px;
      border: 2px solid #444;
      min-height: 100vh;
    }

    .app-inner {
      background: #b4b4b4;
      padding: 0;
    }

    h1, h2 {
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #111;
    }

    h1 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    h2 { font-size: 11px; font-weight: 700; margin: 16px 0 8px 0; color: #333; border-bottom: 1px solid #888; padding-bottom: 4px; }

    /* Forms */
    #add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    input[type="text"], input[type="number"] {
      background: #ccc;
      border: 1px inset #888;
      color: #111;
      font-family: inherit;
      font-size: 13px;
      padding: 4px 6px;
    }

    input[type="number"] { text-align: center; }

    #add-form input[type="text"] { flex: 1; }
    #add-form input[type="number"] { width: 55px; }

    select {
      background: #ccc;
      border: 1px inset #888;
      color: #111;
      font-family: inherit;
      font-size: 13px;
      padding: 4px 6px;
    }

    label { font-size: 11px; color: #555; }

    /* Buttons */
    button {
      background: #b4b4b4;
      border: 2px outset #ccc;
      color: #111;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
    }

    button:hover { background: #ccc; }
    button:active { border-style: inset; }
    button:focus { outline: 1px solid #444; outline-offset: 1px; }

    select:focus, input:focus { outline: 1px solid #444; }

    ul { list-style: none; }

    /* Quest rows */
    .quest-item {
      padding: 5px 8px;
      border-bottom: 1px solid #999;
    }

    .quest-item:focus { outline: 1px solid #444; outline-offset: -1px; }

    .quest-row-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quest-title { flex: 1; cursor: pointer; }
    .quest-title:hover { color: #333; }

    .expand-toggle {
      font-size: 10px;
      color: #777;
      cursor: pointer;
      flex-shrink: 0;
      width: 12px;
      text-align: center;
    }
    .expand-toggle:hover { color: #444; }

    .quest-last-done {
      font-size: 10px;
      color: #555;
      flex-shrink: 0;
      width: 75px;
      text-align: right;
    }

    .quest-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: #555;
      flex-shrink: 0;
    }

    .meta-difficulty {
      display: inline-block;
      width: 85px;
      text-align: right;
    }

    .meta-cycle {
      display: inline-block;
      width: 105px;
      text-align: right;
    }

    .quest-detail {
      font-size: 10px;
      color: #555;
      padding: 3px 0 2px 20px;
    }

    .action-btn {
      font-size: 13px;
      padding: 2px 6px;
      min-width: 24px;
      text-align: center;
    }

    /* Quest edit */
    .quest-edit {
      padding: 5px 8px;
      border-bottom: 1px solid #999;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quest-edit input[type="text"] { flex: 1; }
    .quest-edit input[type="number"] { width: 55px; }

    .edit-hint { font-size: 9px; color: #777; }

    .close-x {
      color: #777;
      cursor: pointer;
      font-size: 13px;
      padding: 0 2px;
    }
    .close-x:hover { color: #992200; }

    /* Quest states */
    .quest-due .quest-title { color: #111; }
    .quest-cooldown .quest-title { color: #777; }
    .quest-cooldown .quest-meta { color: #777; }
    .quest-cooldown .quest-last-done { color: #777; }
    .quest-cooldown .quest-links { color: #777; }
    .quest-cooldown .quest-detail { color: #777; }

    .quest-inactive { opacity: 0.4; }
    .quest-inactive .quest-title { color: #777; cursor: default; }

    /* Completions */
    .completion-item {
      padding: 4px 8px;
      border-bottom: 1px solid #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .completion-title { flex: 1; text-decoration: line-through; color: #777; }
    .completion-time { color: #555; font-size: 10px; }

    .empty-state { color: #777; font-style: italic; padding: 16px 0; }

    .hidden { display: none !important; }

    /* Drag and drop */
    .quest-item.dragging { opacity: 0.3; }
    body.is-dragging { -webkit-user-select: none; user-select: none; }
    .quest-item.drop-above { border-top: 2px solid #444; }
    .quest-item.drop-below { border-bottom: 2px solid #444; }

    /* Link tags */
    .link-tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 0;
      align-items: center;
    }

    .link-tags-row .link-group-label { font-size: 10px; color: #555; margin-right: 2px; }
    .link-tags-row .link-separator { width: 8px; }

    .link-tag {
      font-family: inherit;
      font-size: 10px;
      padding: 2px 6px;
      background: #ccc;
      border: 1px solid #888;
      color: #555;
      cursor: pointer;
    }

    .link-tag.selected { border-color: #444; color: #111; background: #ddd; }
    .link-tag:hover { border-color: #666; color: #333; }

    #add-links-row { margin-bottom: 12px; }

    .quest-links { font-size: 10px; color: #666; width: 180px; text-align: right; overflow-wrap: break-word; flex-shrink: 0; }
    .quest-edit-links { padding: 2px 8px 6px 8px; border-bottom: 1px solid #999; }

    /* XP display */
    .completion-xp { font-size: 10px; color: #1a6e1a; }
    .xp-flash { font-size: 11px; color: #1a6e1a; font-weight: 700; margin-left: 4px; }

    /* Nav */
    .nav {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid #888;
      outline: 1px solid #444;
      margin-bottom: 0;
    }
    .nav button { padding: 4px 12px; font-size: 11px; }
    .nav button.active { border-style: inset; background: #ccc; }
    .nav button.locked { opacity: 0.4; cursor: not-allowed; }

    .battle-lock-msg {
      font-size: 9px;
      color: #992200;
      text-align: center;
      padding: 2px 0;
      animation: fade-in-up 0.5s ease-out;
    }

    /* Toggle switch */
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 11px;
    }

    .toggle input { display: none; }

    .toggle-slider {
      width: 36px;
      height: 18px;
      background: #666;
      border: 2px outset #888;
      position: relative;
      flex-shrink: 0;
    }

    .toggle-slider::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: #b4b4b4;
      border: 1px outset #ccc;
      top: 2px;
      left: 2px;
      transition: left 0.15s;
    }

    .toggle input:checked + .toggle-slider {
      background: #1a6e1a;
    }

    .toggle input:checked + .toggle-slider::after {
      left: 20px;
    }

    .toggle-label { color: #666; }
    .toggle-label.active { color: #111; font-weight: 700; }

    .content-box {
      border: 1px solid #888;
      outline: 1px solid #444;
      padding: 12px;
      margin-top: -1px;
    }

    /* Character view */
    #character-view { font-size: 13px; }

    .char-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

    .char-name {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #111;
    }

    .char-level { color: #555; font-size: 11px; }

    .char-rename-input {
      background: #ccc;
      border: 1px inset #888;
      color: #111;
      font-family: inherit;
      font-size: 14px;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .char-section { margin-bottom: 16px; }

    .char-row { display: flex; padding: 3px 8px; gap: 8px; font-size: 11px; }
    .char-row-name { width: 140px; color: #111; }
    .char-row-level { width: 50px; color: #555; }
    .char-row-xp { width: 110px; color: #666; font-size: 10px; }
    .char-row-attr { color: #666; font-size: 10px; }

    /* Reset / Settings sections */
    .reset-section {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #888;
      display: flex;
      gap: 8px;
    }

    .reset-section button { font-size: 10px; color: #555; }
    .reset-section button:hover { color: #992200; }
    .reset-section button.confirm { color: #992200; border-color: #992200; }

    /* Quest Giver view */
    #quest-giver-view {
    }

    #qg-content { }

    /* Split layout */
    .qg-split {
      display: flex;
      min-height: 160px;
      padding-top: 16px;
    }

    .qg-split-image {
      padding: 0;
      min-width: 180px;
    }

    .qg-split-image img {
      image-rendering: pixelated;
      width: 170px;
      height: auto;
      display: block;
      border: 1px solid #888;
      outline: 1px solid #444;
    }

    .qg-split-text {
      flex: 1;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .qg-flavor {
      font-size: 11px;
      color: #555;
      margin-bottom: 10px;
      line-height: 1.4;
      font-style: italic;
    }

    .qg-prompt {
      font-size: 10px;
      color: #555;
      margin-bottom: 8px;
    }

    .qg-quest-name {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .qg-actions { display: flex; gap: 10px; }
    .qg-actions button { padding: 6px 16px; font-size: 12px; }

    .qg-empty {
      color: #777;
      font-style: italic;
      font-size: 13px;
      text-align: center;
      padding: 60px 0;
    }

    .qg-xp-flash {
      font-size: 12px;
      color: #1a6e1a;
      font-weight: 700;
      margin-top: 4px;
    }

    .qg-xp-flash:empty { display: none; }

    .qg-timer {
      font-size: 64px;
      color: #333;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-left: 1px solid #999;
      min-width: 280px;
    }

    @keyframes timer-flash {
      0% { color: #fff; }
      30% { color: #fff; }
      100% { color: #333; }
    }

    .qg-timer.flashing {
      animation: timer-flash 1s ease-out;
    }

    /* Completion flash — row highlight for quest list */
    @keyframes row-flash {
      0% { background: var(--flash-color); }
      70% { background: var(--flash-color); }
      100% { background: transparent; }
    }

    .quest-item.flashing {
      animation: row-flash 3s ease-out;
    }

    /* Completion animations for Quest Giver */
    @keyframes text-highlight {
      0% { color: #fff; }
      30% { color: #fff; }
      100% { color: #111; }
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(6px); }
      30% { opacity: 1; transform: translateY(0); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .qg-quest-name.pulsing {
      animation: text-highlight 1.5s ease-out;
    }

    .qg-xp-flash.pulsing {
      animation: fade-in-up 1.5s ease-out;
    }

    .qg-content-fading {
      animation: fade-out 0.4s ease-out forwards;
    }

    .level-up-text {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
      animation: fade-in-up 1.5s ease-out;
    }

    /* Progress meters */
    .meter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 8px;
    }

    .meter-label { width: 130px; font-size: 11px; }

    .meter-bar-bg {
      width: 200px;
      flex-shrink: 0;
      height: 10px;
      background: #fff;
      border: 1px solid #444;
    }

    .meter-bar-fill { height: 100%; }

    .meter-text {
      width: 130px;
      font-size: 10px;
      color: #555;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="app-border">
<div class="app-inner">
  <div class="nav">
    <button id="nav-quest-giver" class="active" onclick="showView('quest-giver')"> Next Quest </button>
    <button id="nav-quests" onclick="showView('quests')">Quest List</button>
    <button id="nav-character" onclick="showView('character')">Character</button>
    <button id="nav-settings" onclick="showView('settings')">Settings</button>
  </div>

  <div class="content-box">
  <div id="quest-giver-view">
    <div id="qg-content"></div>
  </div>

  <div id="quests-view" class="hidden">

  <form id="add-form">
    <input type="text" id="quest-title" placeholder="Quest name..." autofocus>
    <select id="quest-type" onchange="toggleCycleInput()">
      <option value="recurring">Recurring</option>
      <option value="one_off">One-off</option>
    </select>
    <label id="cycle-label">
      Days
      <input type="number" id="quest-cycle" value="1" min="1">
    </label>
    <select id="quest-difficulty">
      <option value="trivial">Trivial</option>
      <option value="easy" selected>Easy</option>
      <option value="moderate">Moderate</option>
      <option value="challenging">Challenging</option>
      <option value="epic">Epic</option>
    </select>
    <button type="button" id="toggle-links-btn" onclick="toggleAddLinks()">Tags</button>
    <button type="submit">Add</button>
  </form>

  <div id="add-links-row" class="hidden"></div>

  <ul id="quest-list"></ul>
  </div>

  <div id="character-view" class="hidden">
    <div id="char-content"></div>
    <h2>History</h2>
    <ul id="completion-list"></ul>
  </div>

  <div id="settings-view" class="hidden">
    <h1>Settings</h1>

    <h2>Encounters</h2>
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
      <label class="toggle">
        <span class="toggle-label" id="cta-label-off">Off</span>
        <input type="checkbox" id="cta-toggle" onchange="toggleCTA()">
        <span class="toggle-slider"></span>
        <span class="toggle-label" id="cta-label-on">On</span>
      </label>
    </div>
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
      <label>Interval (minutes)
        <input type="number" id="cta-interval" value="20" min="1" style="width: 55px;">
      </label>
      <button onclick="saveCTAInterval()">Save</button>
    </div>

    <h2>Reset</h2>
    <div class="reset-section" style="margin-top: 8px; border-top: none; padding-top: 0;">
      <button onclick="resetWithConfirm(this, 'reset_character', loadCharacterView)">Reset Char</button>
      <button onclick="resetWithConfirm(this, 'reset_quests', loadAll)">Reset Quests</button>
      <button onclick="resetWithConfirm(this, 'reset_completions', loadAll)">Reset History</button>
    </div>
  </div>
  </div><!-- content-box -->
</div><!-- app-inner -->
</div><!-- app-border -->

  <script>
    const { invoke } = window.__TAURI__.core;

    const questList = document.getElementById("quest-list");
    const completionList = document.getElementById("completion-list");
    const addForm = document.getElementById("add-form");
    const titleInput = document.getElementById("quest-title");
    const typeSelect = document.getElementById("quest-type");
    const cycleInput = document.getElementById("quest-cycle");
    const cycleLabel = document.getElementById("cycle-label");
    const difficultySelect = document.getElementById("quest-difficulty");
    const addLinksRow = document.getElementById("add-links-row");

    // Difficulty color maps (text variants for WCAG AA on #b4b4b4)
    const diffTextColors = {
      "trivial": "#2244aa",
      "easy": "#1a6e1a",
      "moderate": "#7a5500",
      "challenging": "#992200",
      "epic": "#5c2d80",
    };

    // Attribute text colors (dark variants for WCAG AA)
    // Cycling color palette: fill colors first, then text variants
    const fillPalette = ["#ff6633", "#eea800", "#4466cc", "#55cc55", "#8844aa"];
    const textPalette = ["#992200", "#7a5500", "#2244aa", "#1a6e1a", "#5c2d80"];
    const fullPalette = [...fillPalette, ...textPalette];

    function attrFillColor(index) {
      if (index < 0) return "#888";
      return fullPalette[index % fullPalette.length];
    }

    function attrTextColor(index) {
      if (index < 0) return "#333";
      return index < textPalette.length ? textPalette[index] : fullPalette[index % fullPalette.length];
    }

    // Maps rebuilt on each loadAll — keyed by attribute ID
    let attrIndexById = {};

    function levelUpColor(name) {
      // Find index by name from cached attributes, fall back to skill→attribute lookup
      const attr = cachedAttributes.find(a => a.name === name);
      if (attr) return attrTextColor(cachedAttributes.indexOf(attr));
      const skill = cachedSkills.find(s => s.name === name);
      if (skill && skill.attribute_id) {
        const attrIdx = cachedAttributes.findIndex(a => a.id === skill.attribute_id);
        if (attrIdx >= 0) return attrTextColor(attrIdx);
      }
      return "#333";
    }

    function levelUpHtml(levelUps) {
      if (!levelUps || levelUps.length === 0) return "";
      return levelUps.map(lu =>
        `<div class="level-up-text" style="color: ${levelUpColor(lu.name)}">${lu.name} reached Level ${lu.new_level}!</div>`
      ).join("");
    }

    // Image and flavor text pools (loaded at startup)
    let questGiverImages = [];
    let monsterImages = [];
    let victoryImages = [];
    let defeatImages = [];

    let questGiverLines = [
      "Word has reached the guild of a task requiring attention...",
    ];

    let encounterLines = [
      "A trial lays before you...",
    ];

    async function loadPools() {
      try {
        const [qgText, encText, manifestText] = await Promise.all([
          fetch("text/quest-giver-lines.txt").then(r => r.text()),
          fetch("text/encounter-lines.txt").then(r => r.text()),
          fetch("images/manifest.json").then(r => r.json()),
        ]);
        const qgLines = qgText.split("\n").map(l => l.trim()).filter(l => l);
        const encLines = encText.split("\n").map(l => l.trim()).filter(l => l);
        if (qgLines.length > 0) questGiverLines = qgLines;
        if (encLines.length > 0) encounterLines = encLines;
        questGiverImages = manifestText["quest-givers"] || [];
        monsterImages = manifestText["monsters"] || [];
        victoryImages = manifestText["victory"] || [];
        defeatImages = manifestText["defeat"] || [];
      } catch (e) {
        console.error("Failed to load pools:", e);
      }
    }

    function randomFromExcluding(arr, previous) {
      if (!arr || arr.length === 0) return null;
      if (arr.length === 1) return arr[0];
      let pick;
      do { pick = arr[Math.floor(Math.random() * arr.length)]; }
      while (pick === previous);
      return pick;
    }

    let currentQGImage = null;
    let currentQGLine = null;
    let currentMonsterImage = null;
    let currentEncounterLine = null;

    let editingId = null;
    let cachedQuests = [];
    let draggedId = null;
    let cachedSkills = [];
    let cachedAttributes = [];
    let skillNameMap = {};
    let attrNameMap = {};

    // Quest Giver state
    let nextQuestIndex = 0;

    // Break timer state (display only — state lives in backend)
    let timerStartLocal = null;   // Date.now() cached locally for display
    let timerTitleLocal = null;   // cached quest title for display
    let timerInterval = null;     // setInterval handle

    function toggleCycleInput() {
      cycleLabel.classList.toggle("hidden", typeSelect.value === "one_off");
    }

    function toggleAddLinks() {
      addLinksRow.classList.toggle("hidden");
    }

    function renderAddLinkTags() {
      addLinksRow.innerHTML = renderLinkTagsHtml("add", [], []);
    }

    function renderLinkTagsHtml(prefix, selectedSkillIds, selectedAttrIds) {
      const skillTags = cachedSkills.map(s => {
        const sel = selectedSkillIds.includes(s.id) ? "selected" : "";
        return `<button type="button" class="link-tag ${sel}"
                  data-id="${s.id}" data-kind="skill"
                  onclick="toggleLinkTag(this)">${escapeHtml(s.name)}</button>`;
      }).join("");

      const attrTags = cachedAttributes.map(a => {
        const sel = selectedAttrIds.includes(a.id) ? "selected" : "";
        return `<button type="button" class="link-tag ${sel}"
                  data-id="${a.id}" data-kind="attr"
                  onclick="toggleLinkTag(this)">${escapeHtml(a.name)}</button>`;
      }).join("");

      return `<div class="link-tags-row">
        <span class="link-group-label">Skills</span>${skillTags}
        <span class="link-separator"></span>
        <span class="link-group-label">Attrs</span>${attrTags}
      </div>`;
    }

    function toggleLinkTag(btn) {
      btn.classList.toggle("selected");
    }

    function getSelectedLinkIds(container) {
      const skillIds = [];
      const attributeIds = [];
      container.querySelectorAll(".link-tag.selected").forEach(btn => {
        if (btn.dataset.kind === "skill") skillIds.push(btn.dataset.id);
        else attributeIds.push(btn.dataset.id);
      });
      return { skillIds, attributeIds };
    }

    function linkNamesText(q) {
      const names = [];
      q.skill_ids.forEach(id => { if (skillNameMap[id]) names.push(skillNameMap[id]); });
      q.attribute_ids.forEach(id => { if (attrNameMap[id]) names.push(attrNameMap[id]); });
      return names.join(", ");
    }

    async function loadAll() {
      const fetches = [invoke("get_quests"), invoke("get_completions")];
      if (cachedSkills.length === 0) {
        fetches.push(invoke("get_skills"), invoke("get_attributes"));
      }
      const results = await Promise.all(fetches);
      if (results.length === 4) {
        cachedSkills = results[2];
        cachedAttributes = results[3];
        skillNameMap = {};
        attrNameMap = {};
        cachedSkills.forEach(s => skillNameMap[s.id] = s.name);
        cachedAttributes.forEach(a => attrNameMap[a.id] = a.name);
        attrIndexById = {};
        cachedAttributes.forEach((a, i) => { attrIndexById[a.id] = i; });
        renderAddLinkTags();
      }
      renderQuests(results[0]);
      renderCompletions(results[1]);
      if (!questGiverView.classList.contains("hidden")) {
        renderQuestGiver();
      }
    }

    function renderQuests(quests) {
      cachedQuests = quests;

      if (quests.length === 0) {
        questList.innerHTML = '<li class="empty-state">No quests yet. Add one above.</li>';
        return;
      }

      questList.innerHTML = quests
        .map(q => editingId === q.id ? renderEditMode(q) : renderQuestRow(q))
        .join("");

      if (editingId) {
        const el = document.getElementById("edit-title");
        if (el) el.focus();
      }
    }

    function difficultyLabel(d) {
      return d.charAt(0).toUpperCase() + d.slice(1);
    }

    function toggleDetail(el) {
      const li = el.closest(".quest-item");
      const detail = li.querySelector(".quest-detail");
      if (!detail) return;
      const hidden = detail.style.display === "none";
      detail.style.display = hidden ? "block" : "none";
      el.textContent = hidden ? "▾" : "▸";
    }

    function renderQuestRow(q) {
      const cycleText = q.quest_type === "recurring"
        ? `Every ${q.cycle_days} day${q.cycle_days !== 1 ? "s" : ""}`
        : "One-off";

      let stateClass;
      if (!q.active) {
        stateClass = "quest-inactive";
      } else if (q.is_due) {
        stateClass = "quest-due";
      } else {
        stateClass = "quest-cooldown";
      }

      const lastDone = q.last_completed ? formatTimestamp(q.last_completed) : "";

      const links = linkNamesText(q);
      const hasDetail = !!links;

      const diffColor = q.is_due ? (diffTextColors[q.difficulty] || '#555') : '#777';

      const questNowBtn = q.active
        ? `<button class="action-btn" onclick="listQuestNow('${q.id}')">⚔</button>`
        : "";

      const doneBtn = q.active
        ? `<button class="action-btn done-btn" onclick="completeQuest('${q.id}')">✓</button>`
        : "";

      return `<li class="quest-item ${stateClass}" data-id="${q.id}" tabindex="0"
                  onkeydown="handleQuestKey(event, '${q.id}', '${escapeAttr(q.title)}')"
                  onpointerdown="${q.active ? `onPointerDown(event, '${q.id}')` : ''}">
        <div class="quest-row-top">
          <span class="expand-toggle" onclick="toggleDetail(this)">${hasDetail ? '▸' : ''}</span>
          <span class="quest-title" onclick="startEdit('${q.id}')">${escapeHtml(q.title)}</span>
          <span class="quest-meta">
            <span class="meta-cycle">${cycleText}</span>
            <span class="meta-difficulty" style="color: ${diffColor}">${difficultyLabel(q.difficulty)}</span>
          </span>
          <span class="quest-last-done">${lastDone}</span>
          ${questNowBtn}
          ${doneBtn}
        </div>
        ${hasDetail ? `<div class="quest-detail" style="display:none"><span class="quest-links">${escapeHtml(links)}</span></div>` : ''}
      </li>`;
    }

    function renderEditMode(q) {
      const isRecurring = q.quest_type === "recurring";
      const cycleVal = q.cycle_days || 1;
      const diff = q.difficulty;
      return `<li class="quest-edit" data-id="${q.id}">
        <input type="text" id="edit-title" value="${escapeAttr(q.title)}"
               onkeydown="handleEditKey(event, '${q.id}')">
        <select id="edit-type" onchange="toggleEditCycle()" onkeydown="handleEditKey(event, '${q.id}')">
          <option value="recurring" ${isRecurring ? "selected" : ""}>Recurring</option>
          <option value="one_off" ${!isRecurring ? "selected" : ""}>One-off</option>
        </select>
        <label id="edit-cycle-label" class="${isRecurring ? "" : "hidden"}">
          Days
          <input type="number" id="edit-cycle" value="${cycleVal}" min="1"
                 onkeydown="handleEditKey(event, '${q.id}')">
        </label>
        <select id="edit-difficulty" onkeydown="handleEditKey(event, '${q.id}')">
          <option value="trivial" ${diff === "trivial" ? "selected" : ""}>Trivial</option>
          <option value="easy" ${diff === "easy" ? "selected" : ""}>Easy</option>
          <option value="moderate" ${diff === "moderate" ? "selected" : ""}>Moderate</option>
          <option value="challenging" ${diff === "challenging" ? "selected" : ""}>Challenging</option>
          <option value="epic" ${diff === "epic" ? "selected" : ""}>Epic</option>
        </select>
        <button onclick="saveEdit('${q.id}')">Save</button>
        <button class="del-btn" onclick="deleteQuest('${q.id}', '${escapeAttr(q.title)}')">Del</button>
        <span class="close-x" onclick="cancelEdit()">✕</span>
      </li>
      <li class="quest-edit-links" id="edit-links-container">
        ${renderLinkTagsHtml("edit", q.skill_ids || [], q.attribute_ids || [])}
      </li>`;
    }

    function toggleEditCycle() {
      const editType = document.getElementById("edit-type");
      const editCycleLabel = document.getElementById("edit-cycle-label");
      editCycleLabel.classList.toggle("hidden", editType.value === "one_off");
    }

    function renderCompletions(completions) {
      if (completions.length === 0) {
        completionList.innerHTML = '<li class="empty-state">No completions yet.</li>';
        return;
      }

      completionList.innerHTML = completions
        .map(c => {
          const xpText = c.xp_earned > 0 ? `<span class="completion-xp">+${c.xp_earned} XP</span>` : "";
          return `<li class="completion-item">
            <span class="completion-title">${escapeHtml(c.quest_title)}</span>
            ${xpText}
            <span class="completion-time">${formatTimestamp(c.completed_at)}</span>
            <button onclick="deleteCompletion('${c.id}')">Del</button>
          </li>`;
        })
        .join("");
    }

    function handleQuestKey(e, id, title) {
      if (e.key === "ArrowUp" && e.altKey) {
        e.preventDefault();
        moveQuest(id, -1);
      } else if (e.key === "ArrowDown" && e.altKey) {
        e.preventDefault();
        moveQuest(id, 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        focusAdjacentQuest(id, -1);
      } else if (e.key === "ArrowDown") {
        e.preventDefault();
        focusAdjacentQuest(id, 1);
      } else if (e.key === "e" || e.key === "E") {
        e.preventDefault();
        startEdit(id);
      } else if (e.key === "Delete" || e.key === "Backspace") {
        e.preventDefault();
        deleteQuest(id, title);
      } else if (e.key === "Enter") {
        e.preventDefault();
        completeQuest(id);
      }
    }

    function startEdit(id) {
      editingId = id;
      loadAll();
    }

    function cancelEdit() {
      editingId = null;
      loadAll();
    }

    function handleEditKey(e, id) {
      if (e.key === "Enter") {
        e.preventDefault();
        saveEdit(id);
      } else if (e.key === "Escape") {
        e.preventDefault();
        cancelEdit();
      }
    }

    async function saveEdit(id) {
      const title = document.getElementById("edit-title").value.trim();
      if (!title) return;

      const questType = document.getElementById("edit-type").value;
      const difficulty = document.getElementById("edit-difficulty").value;
      const params = { questId: id, title, questType, difficulty };

      if (questType === "recurring") {
        params.cycleDays = parseInt(document.getElementById("edit-cycle").value, 10) || 1;
      }

      await invoke("update_quest", params);

      const linksContainer = document.getElementById("edit-links-container");
      if (linksContainer) {
        const { skillIds, attributeIds } = getSelectedLinkIds(linksContainer);
        await invoke("set_quest_links", { questId: id, skillIds, attributeIds });
      }

      editingId = null;
      await loadAll();
    }

    async function completeQuest(id) {
      const quest = cachedQuests.find(q => q.id === id);
      const completion = await invoke("complete_quest", { questId: id });

      const row = questList.querySelector(`[data-id="${id}"]`);
      if (row) {
        const color = diffTextColors[quest?.difficulty] || "#1a6e1a";
        row.style.setProperty("--flash-color", color + "33");
        row.classList.add("flashing");

        // Show XP and level-ups together below the quest title
        const feedbackDiv = document.createElement("div");
        feedbackDiv.style.marginLeft = "4px";
        let feedbackHtml = "";
        if (completion.xp_earned > 0) {
          feedbackHtml += `<span class="xp-flash" style="color: ${color}">+${completion.xp_earned} XP</span>`;
        }
        if (completion.level_ups?.length > 0) {
          feedbackHtml += levelUpHtml(completion.level_ups);
        }
        feedbackDiv.innerHTML = feedbackHtml;
        row.querySelector(".quest-title")?.after(feedbackDiv);
      }

      setTimeout(() => loadAll(), 3000);
    }

    async function deleteQuest(id, title) {
      try {
        await invoke("delete_quest", { questId: id });
      } catch (e) {
        const errDiv = document.createElement("div");
        errDiv.style.cssText = "color:red;padding:8px;border:1px solid red;margin:4px 0";
        errDiv.textContent = "Delete failed: " + e;
        questList.prepend(errDiv);
        return;
      }
      await loadAll();
    }

    async function deleteCompletion(id) {
      await invoke("delete_completion", { completionId: id });
      await loadAll();
    }

    function focusAdjacentQuest(id, direction) {
      const items = Array.from(questList.querySelectorAll(".quest-item"));
      const idx = items.findIndex(el => el.dataset.id === id);
      const target = items[idx + direction];
      if (target) target.focus();
    }

    async function moveQuest(id, direction) {
      const items = Array.from(questList.querySelectorAll(".quest-item"));
      const idx = items.findIndex(el => el.dataset.id === id);
      const neighborIdx = idx + direction;

      if (neighborIdx < 0 || neighborIdx >= items.length) return;
      if (items[idx].classList.contains("quest-inactive")) return;
      if (items[neighborIdx].classList.contains("quest-inactive")) return;

      const neighborId = items[neighborIdx].dataset.id;
      const moving = cachedQuests.find(q => q.id === id);
      const neighbor = cachedQuests.find(q => q.id === neighborId);
      if (!moving || !neighbor) return;

      await invoke("reorder_quests", {
        orders: [
          { id: moving.id, sort_order: neighbor.sort_order },
          { id: neighbor.id, sort_order: moving.sort_order },
        ]
      });

      await loadAll();
      const movedEl = questList.querySelector(`[data-id="${id}"]`);
      if (movedEl) movedEl.focus();
    }

    let dragStartY = 0;
    let isDragging = false;

    function onPointerDown(e, id) {
      if (e.target.closest("button")) return;
      draggedId = id;
      dragStartY = e.clientY;
      isDragging = false;

      const onMove = (me) => {
        if (!isDragging && Math.abs(me.clientY - dragStartY) > 5) {
          isDragging = true;
          document.body.classList.add("is-dragging");
          window.getSelection()?.removeAllRanges();
          const el = questList.querySelector(`[data-id="${draggedId}"]`);
          if (el) el.classList.add("dragging");
        }
        if (!isDragging) return;

        clearDropIndicators();
        const target = getDropTarget(me.clientY);
        if (target && target.id !== draggedId) {
          const rect = target.el.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          target.el.classList.add(me.clientY < mid ? "drop-above" : "drop-below");
        }
      };

      const onUp = async (ue) => {
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);

        if (!isDragging) { draggedId = null; return; }

        const target = getDropTarget(ue.clientY);
        clearDropIndicators();
        document.body.classList.remove("is-dragging");
        questList.querySelectorAll(".dragging").forEach(el => el.classList.remove("dragging"));

        if (!target || target.id === draggedId) { draggedId = null; return; }

        const activeQuests = cachedQuests.filter(q => q.active);
        const draggedIdx = activeQuests.findIndex(q => q.id === draggedId);
        if (draggedIdx === -1) { draggedId = null; return; }

        const rect = target.el.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        let targetIdx = activeQuests.findIndex(q => q.id === target.id);
        if (ue.clientY >= mid && targetIdx < draggedIdx) targetIdx++;
        if (ue.clientY < mid && targetIdx > draggedIdx) targetIdx--;

        const reordered = [...activeQuests];
        const [moved] = reordered.splice(draggedIdx, 1);
        reordered.splice(targetIdx, 0, moved);

        const sortOrders = activeQuests.map(q => q.sort_order).sort((a, b) => b - a);
        const orders = reordered.map((q, i) => ({ id: q.id, sort_order: sortOrders[i] }));

        await invoke("reorder_quests", { orders });
        draggedId = null;
        isDragging = false;
        await loadAll();
      };

      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    }

    function getDropTarget(clientY) {
      const items = Array.from(questList.querySelectorAll(".quest-item:not(.quest-inactive)"));
      for (const el of items) {
        const rect = el.getBoundingClientRect();
        if (clientY >= rect.top && clientY <= rect.bottom) {
          return { el, id: el.dataset.id };
        }
      }
      return null;
    }

    function clearDropIndicators() {
      questList.querySelectorAll(".drop-above, .drop-below").forEach(el => {
        el.classList.remove("drop-above", "drop-below");
      });
    }

    addForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = titleInput.value.trim();
      if (!title) return;

      const questType = typeSelect.value;
      const difficulty = difficultySelect.value;
      const params = { title, questType, difficulty };

      if (questType === "recurring") {
        params.cycleDays = parseInt(cycleInput.value, 10) || 1;
      }

      const quest = await invoke("add_quest", params);

      const { skillIds, attributeIds } = getSelectedLinkIds(addLinksRow);
      if (skillIds.length > 0 || attributeIds.length > 0) {
        await invoke("set_quest_links", { questId: quest.id, skillIds, attributeIds });
      }

      titleInput.value = "";
      addLinksRow.classList.add("hidden");
      renderAddLinkTags();
      titleInput.focus();
      await loadAll();
          });

    function formatTimestamp(iso) {
      const d = new Date(iso);
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hours = String(d.getHours()).padStart(2, "0");
      const mins = String(d.getMinutes()).padStart(2, "0");
      return `${month}/${day} ${hours}:${mins}`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // --- Navigation ---

    const questGiverView = document.getElementById("quest-giver-view");
    const qgContent = document.getElementById("qg-content");
    const questsView = document.getElementById("quests-view");
    const characterView = document.getElementById("character-view");
    const charContent = document.getElementById("char-content");
    let renamingChar = false;

    const settingsView = document.getElementById("settings-view");

    function showView(view) {
      if (view !== "quest-giver" && timerInterval) {
        showBattleLockMessage();
        return;
      }
      document.getElementById("nav-quest-giver").classList.toggle("active", view === "quest-giver");
      document.getElementById("nav-quests").classList.toggle("active", view === "quests");
      document.getElementById("nav-character").classList.toggle("active", view === "character");
      document.getElementById("nav-settings").classList.toggle("active", view === "settings");
      questGiverView.classList.toggle("hidden", view !== "quest-giver");
      questsView.classList.toggle("hidden", view !== "quests");
      characterView.classList.toggle("hidden", view !== "character");
      settingsView.classList.toggle("hidden", view !== "settings");
      if (view === "character") loadCharacterView();
      if (view === "quest-giver") renderQuestGiver();
      if (view === "settings") loadSettings();
    }

    function setTabsLocked(locked) {
      ["nav-quests", "nav-character", "nav-settings"].forEach(id => {
        document.getElementById(id).classList.toggle("locked", locked);
      });
    }

    function showBattleLockMessage() {
      const nav = document.querySelector(".nav");
      if (nav.querySelector(".battle-lock-msg")) return;
      const msg = document.createElement("div");
      msg.className = "battle-lock-msg";
      msg.textContent = "You are currently locked in battle!";
      nav.appendChild(msg);
      setTimeout(() => msg.remove(), 2000);
    }

    // --- Quest Giver ---

    async function renderQuestGiver() {
      // Timer mode — check backend state
      if (timerInterval) {
        renderTimerMode();
        return;
      }

      // Selection mode — ask backend for the next quest
      const quest = await invoke("get_next_quest", { skipCount: nextQuestIndex });

      if (cachedQuests.filter(q => q.active).length === 0) {
        qgContent.innerHTML = '<div class="qg-empty">No quests yet. Add some in the Quest List tab.</div>';
        return;
      }

      if (!quest) {
        qgContent.innerHTML = '<div class="qg-empty">All caught up. Rest well, adventurer.</div>';
        return;
      }

      if (!currentQGImage) currentQGImage = randomFromExcluding(questGiverImages, currentQGImage);
      currentQGLine = randomFromExcluding(questGiverLines, currentQGLine);
      qgContent.innerHTML = `
        <div class="qg-split">
          <div class="qg-split-image">
            <img src="${currentQGImage}" alt="Quest Giver">
          </div>
          <div class="qg-split-text">
            <div class="qg-flavor">${currentQGLine}</div>
            <div class="qg-quest-name">${escapeHtml(quest.title)}</div>
            <div class="qg-prompt">Does our stalwart hero accept this quest?</div>
            <div class="qg-actions">
              <button onclick="qgDone('${quest.id}', '${quest.difficulty}')">Done</button>
              <button onclick="qgQuestNow('${quest.id}')">Quest Now</button>
              <button onclick="qgSomethingElse()">Something Else</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderTimerMode() {
      const elapsed = Date.now() - timerStartLocal;
      qgContent.innerHTML = `
        <div class="qg-split">
          <div class="qg-split-image">
            <img src="${currentMonsterImage}" alt="Monster">
          </div>
          <div class="qg-split-text">
            <div class="qg-flavor">${currentEncounterLine}</div>
            <div class="qg-quest-name" style="font-size: 18px;">${escapeHtml(timerTitleLocal)}</div>
            <div class="qg-actions">
              <button onclick="timerDone()">Victorious!</button>
              <button onclick="cancelTimer()">Defeated</button>
            </div>
            <div class="qg-xp-flash" id="qg-xp-flash"></div>
          </div>
          <div class="qg-timer" id="timer-display">${formatTimer(elapsed)}</div>
        </div>
      `;
    }

    function updateTimerDisplay() {
      const el = document.getElementById("timer-display");
      if (el && timerStartLocal) {
        el.textContent = formatTimer(Date.now() - timerStartLocal);
      }
    }

    function formatTimer(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = totalSecs % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    async function startTimer(questId) {
      currentMonsterImage = randomFromExcluding(monsterImages, currentMonsterImage);
      currentEncounterLine = randomFromExcluding(encounterLines, currentEncounterLine);
      const info = await invoke("start_timer", { questId, monsterImage: currentMonsterImage, encounterLine: currentEncounterLine });
      timerStartLocal = Date.now();
      timerTitleLocal = info.questTitle;
      timerInterval = setInterval(updateTimerDisplay, 1000);
      setTabsLocked(true);
    }

    async function cancelTimer() {
      if (timerInterval) clearInterval(timerInterval);
      const questTitle = timerTitleLocal;
      timerStartLocal = null;
      timerTitleLocal = null;
      timerInterval = null;
      setTabsLocked(false);
      await invoke("cancel_timer");

      const defeatImg = randomFromExcluding(defeatImages, null);
      if (defeatImg) {
        qgContent.innerHTML = `
          <div class="qg-split">
            <div class="qg-split-image">
              <img src="${defeatImg}" alt="Defeated">
            </div>
            <div class="qg-split-text">
              <div class="qg-quest-name pulsing" style="font-size: 18px;">${escapeHtml(questTitle || "")}</div>
              <div class="qg-flavor">Sorry, bud.</div>
            </div>
          </div>
        `;
        nextQuestIndex++;
        setTimeout(() => {
          qgContent.classList.add("qg-content-fading");
          setTimeout(() => {
            qgContent.classList.remove("qg-content-fading");
            currentQGImage = randomFromExcluding(questGiverImages, currentQGImage);
            loadAll();
          }, 400);
        }, 3000);
      } else {
        nextQuestIndex++;
        currentQGImage = randomFromExcluding(questGiverImages, currentQGImage);
        renderQuestGiver();
      }
    }

    async function qgQuestNow(questId) {
      currentMonsterImage = randomFromExcluding(monsterImages, currentMonsterImage);
      currentEncounterLine = randomFromExcluding(encounterLines, currentEncounterLine);
      await invoke("start_timer", { questId, monsterImage: currentMonsterImage, encounterLine: currentEncounterLine });
      timerStartLocal = Date.now();
      const timerState = await invoke("get_timer_state");
      timerTitleLocal = timerState.questTitle;
      timerInterval = setInterval(updateTimerDisplay, 1000);
      setTabsLocked(true);
      renderQuestGiver();
    }

    async function timerDone() {
      if (timerInterval) clearInterval(timerInterval);
      const finalElapsed = timerStartLocal ? formatTimer(Date.now() - timerStartLocal) : "";
      timerStartLocal = null;
      timerTitleLocal = null;
      timerInterval = null;
      setTabsLocked(false);
      const completion = await invoke("complete_timer");

      nextQuestIndex = 0;
      let textHtml = `<div class="qg-quest-name pulsing" style="font-size: 18px;">${escapeHtml(completion.quest_title)}</div>`;
      if (completion.xp_earned > 0) {
        textHtml += `<div class="qg-xp-flash pulsing">+${completion.xp_earned} XP</div>`;
      }
      textHtml += levelUpHtml(completion.level_ups);
      const victoryImg = randomFromExcluding(victoryImages, null) || currentMonsterImage;
      qgContent.innerHTML = `
        <div class="qg-split">
          <div class="qg-split-image">
            <img src="${victoryImg}" alt="Victorious">
          </div>
          <div class="qg-split-text">${textHtml}</div>
          ${finalElapsed ? `<div class="qg-timer flashing">${finalElapsed}</div>` : ""}
        </div>
      `;
      setTimeout(() => {
        qgContent.classList.add("qg-content-fading");
        setTimeout(() => {
          qgContent.classList.remove("qg-content-fading");
          currentQGImage = randomFromExcluding(questGiverImages, currentQGImage);
          loadAll();
        }, 400);
      }, 3000);
    }

    async function qgDone(questId, difficulty) {
      const completion = await invoke("complete_quest", { questId });
      const color = diffTextColors[difficulty] || "#1a6e1a";

      // Show completion feedback with pulse in split layout
      let textHtml = `<div class="qg-quest-name pulsing">${escapeHtml(completion.quest_title)}</div>`;
      if (completion.xp_earned > 0) {
        textHtml += `<div class="qg-xp-flash pulsing" style="color: ${color}">+${completion.xp_earned} XP</div>`;
      }
      textHtml += levelUpHtml(completion.level_ups);
      qgContent.innerHTML = `
        <div class="qg-split">
          <div class="qg-split-image">
            <img src="${currentQGImage}" alt="Quest Giver">
          </div>
          <div class="qg-split-text">${textHtml}</div>
        </div>
      `;

      // Hold for 2.5s, then fade out and show next quest
      nextQuestIndex = 0;
      setTimeout(() => {
        qgContent.classList.add("qg-content-fading");
        setTimeout(() => {
          qgContent.classList.remove("qg-content-fading");
          currentQGImage = randomFromExcluding(questGiverImages, currentQGImage);
          loadAll();
        }, 400);
      }, 2500);
    }

    async function qgSomethingElse() {
      nextQuestIndex++;
      currentQGImage = randomFromExcluding(questGiverImages, currentQGImage);
      await renderQuestGiver();
    }

    // Quest Now from list view
    async function listQuestNow(questId) {
      currentMonsterImage = randomFromExcluding(monsterImages, currentMonsterImage);
      currentEncounterLine = randomFromExcluding(encounterLines, currentEncounterLine);
      await startTimer(questId);
      showView("quest-giver");
    }

    async function loadCharacterView() {
      const [character, attributes, skills] = await Promise.all([
        invoke("get_character"),
        invoke("get_attributes"),
        invoke("get_skills"),
      ]);
      renderCharacterView(character, attributes, skills);
    }

    // Attribute fill colors (bright variants for meter bars)
    function meterPercent(into, total) {
      if (total <= 0) return 0;
      return Math.min(100, Math.round((into / total) * 100));
    }

    function renderCharacterView(character, attributes, skills) {
      const nameHtml = renamingChar
        ? `<input type="text" class="char-rename-input" id="char-name-input"
                  value="${escapeAttr(character.name)}"
                  onkeydown="handleRenameKey(event)">
           <button onclick="saveCharName()">Save</button>
           <button onclick="cancelRename()"> Esc </button>`
        : `<span class="char-name">${escapeHtml(character.name)}</span>
           <button onclick="startRename()">Rename</button>`;

      // Character XP meter uses the color of the highest attribute
      let highestIdx = 0;
      attributes.forEach((a, i) => { if (a.xp > (attributes[highestIdx]?.xp || 0)) highestIdx = i; });
      const charColor = attrFillColor(highestIdx);

      const charMeter = `
        <div class="meter-row">
          <span class="meter-label">Character XP</span>
          <div class="meter-bar-bg"><div class="meter-bar-fill" style="width: ${meterPercent(character.xp_into_current_level, character.xp_for_current_level)}%; background: ${charColor};"></div></div>
          <span class="meter-text">Lv ${character.level} (${character.xp_into_current_level}/${character.xp_for_current_level} XP)</span>
        </div>`;

      const attrRows = attributes.map((a, i) => {
        const color = attrFillColor(i);
        const pct = meterPercent(a.xp_into_current_level, a.xp_for_current_level);
        return `<div class="meter-row">
          <span class="meter-label">${escapeHtml(a.name)}</span>
          <div class="meter-bar-bg"><div class="meter-bar-fill" style="width: ${pct}%; background: ${color};"></div></div>
          <span class="meter-text">Lv ${a.level} (${a.xp_into_current_level}/${a.xp_for_current_level} XP)</span>
        </div>`;
      }).join("");

      const attrMap = {};
      attributes.forEach(a => { attrMap[a.id] = a.name; });

      const skillRows = skills.map(s => {
        const attrIdx = s.attribute_id ? (attrIndexById[s.attribute_id] ?? -1) : -1;
        const color = attrFillColor(attrIdx);
        const pct = meterPercent(s.xp_into_current_level, s.xp_for_current_level);
        return `<div class="meter-row">
          <span class="meter-label">${escapeHtml(s.name)}</span>
          <div class="meter-bar-bg"><div class="meter-bar-fill" style="width: ${pct}%; background: ${color};"></div></div>
          <span class="meter-text">Lv ${s.level} (${s.xp_into_current_level}/${s.xp_for_current_level} XP)</span>
          <span class="char-row-attr">${escapeHtml(attrMap[s.attribute_id] || "")}</span>
        </div>`;
      }).join("");

      charContent.innerHTML = `
        <div class="char-header">
          ${nameHtml}
        </div>
        ${charMeter}
        <div class="char-section">
          <h2>Attributes</h2>
          ${attrRows}
        </div>
        <div class="char-section">
          <h2>Skills</h2>
          ${skillRows}
        </div>
      `;

      if (renamingChar) {
        const input = document.getElementById("char-name-input");
        if (input) { input.focus(); input.select(); }
      }
    }

    function startRename() {
      renamingChar = true;
      loadCharacterView();
    }

    function cancelRename() {
      renamingChar = false;
      loadCharacterView();
    }

    function handleRenameKey(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        saveCharName();
      } else if (e.key === "Escape") {
        e.preventDefault();
        cancelRename();
      }
    }

    async function saveCharName() {
      const input = document.getElementById("char-name-input");
      const name = input?.value.trim();
      if (!name) return;
      await invoke("update_character", { name });
      renamingChar = false;
      await loadCharacterView();
    }

    // --- Settings ---

    function updateToggleLabels(enabled) {
      document.getElementById("cta-label-off").classList.toggle("active", !enabled);
      document.getElementById("cta-label-on").classList.toggle("active", enabled);
    }

    async function loadSettings() {
      const settings = await invoke("get_settings");
      document.getElementById("cta-interval").value = settings.ctaIntervalMinutes;
      document.getElementById("cta-toggle").checked = settings.callToAdventure;
      updateToggleLabels(settings.callToAdventure);
    }

    async function toggleCTA() {
      const newVal = await invoke("toggle_call_to_adventure");
      document.getElementById("cta-toggle").checked = newVal;
      updateToggleLabels(newVal);
    }

    async function saveCTAInterval() {
      const input = document.getElementById("cta-interval");
      const minutes = parseInt(input.value, 10);
      if (!minutes || minutes < 1) return;
      await invoke("set_cta_interval", { minutes });
    }

    function resetWithConfirm(btn, command, callback) {
      if (btn.dataset.confirming) {
        btn.dataset.confirming = "";
        invoke(command).then(() => callback());
        btn.textContent = btn.dataset.original;
        btn.classList.remove("confirm");
        return;
      }
      btn.dataset.confirming = "true";
      btn.dataset.original = btn.textContent;
      btn.textContent = "Sure?";
      btn.classList.add("confirm");
      setTimeout(() => {
        if (btn.dataset.confirming) {
          btn.dataset.confirming = "";
          btn.textContent = btn.dataset.original;
          btn.classList.remove("confirm");
        }
      }, 2000);
    }

    // On window focus: refresh settings, check if a timer was started externally
    window.addEventListener("focus", async () => {
      if (!settingsView.classList.contains("hidden")) loadSettings();

      // If a timer is running in the backend but not locally, sync up
      if (!timerInterval) {
        const timerState = await invoke("get_timer_state");
        if (timerState.active) {
          timerStartLocal = timerState.startedAt;
          timerTitleLocal = timerState.questTitle;
          if (timerState.monsterImage) currentMonsterImage = timerState.monsterImage;
          if (timerState.encounterLine) currentEncounterLine = timerState.encounterLine;
          timerInterval = setInterval(updateTimerDisplay, 1000);
          setTabsLocked(true);
          showView("quest-giver");
        }
      }
    });

    loadPools().then(() => loadAll());
  </script>
</body>
</html>
