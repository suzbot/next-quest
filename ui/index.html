<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Quest</title>
  <style>
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 400;
      src: url('fonts/Silkscreen-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Silkscreen';
      font-weight: 700;
      src: url('fonts/Silkscreen-Bold.ttf') format('truetype');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b4b4b4;
      color: #111;
      font-family: 'Silkscreen', monospace;
      font-size: 13px;
      padding: 0;
    }

    .app-border {
      background:
        repeating-linear-gradient(45deg, transparent, transparent 4px, #9a9a9a 4px, #9a9a9a 5px),
        repeating-linear-gradient(-45deg, transparent, transparent 4px, #9a9a9a 4px, #9a9a9a 5px);
      background-color: #b4b4b4;
      padding: 10px;
      border: 2px solid #444;
      min-height: 100vh;
    }

    .app-inner {
      background: #b4b4b4;
      padding: 0;
    }

    h1, h2 {
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #111;
    }

    h1 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    h2 { font-size: 11px; font-weight: 700; margin: 16px 0 8px 0; color: #333; border-bottom: 1px solid #888; padding-bottom: 4px; }

    /* Forms */
    #add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    input[type="text"], input[type="number"] {
      background: #ccc;
      border: 1px inset #888;
      color: #111;
      font-family: inherit;
      font-size: 13px;
      padding: 4px 6px;
    }

    input[type="number"] { text-align: center; }

    #add-form input[type="text"] { flex: 1; }
    #add-form input[type="number"] { width: 55px; }

    select {
      background: #ccc;
      border: 1px inset #888;
      color: #111;
      font-family: inherit;
      font-size: 13px;
      padding: 4px 6px;
    }

    label { font-size: 11px; color: #555; }

    /* Buttons */
    button {
      background: #b4b4b4;
      border: 2px outset #ccc;
      color: #111;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #ccc; }
    button:active { border-style: inset; }
    button:focus { outline: 1px solid #444; outline-offset: 1px; }

    select:focus, input:focus { outline: 1px solid #444; }

    ul { list-style: none; }

    /* Quest rows */
    .quest-item {
      padding: 5px 8px;
      border-bottom: 1px solid #999;
    }

    .quest-item:focus { outline: 1px solid #444; outline-offset: -1px; }

    .quest-row-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quest-title { flex: 1; cursor: pointer; }
    .quest-title:hover { color: #333; }

    .expand-toggle {
      font-size: 10px;
      color: #777;
      cursor: pointer;
      flex-shrink: 0;
      width: 12px;
      text-align: center;
    }
    .expand-toggle:hover { color: #444; }

    .quest-last-done {
      font-size: 10px;
      color: #555;
      flex-shrink: 0;
      width: 75px;
      text-align: right;
    }
    .quest-importance { color: #a85; font-size: 10px; margin-left: 2px; }
    .quest-debug { font-size: 9px; color: #666; margin-top: 2px; }
    .last-done-picker-wrap { position: relative; flex-shrink: 0; }
    .last-done-picker-icon { font-size: 11px; color: #888; cursor: pointer; }
    .last-done-picker-icon:hover { color: #444; }
    .last-done-picker-input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }

    .quest-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: #555;
      flex-shrink: 0;
    }

    .meta-difficulty {
      display: inline-block;
      width: 40px;
      text-align: right;
    }

    .meta-cycle {
      display: inline-block;
      width: 50px;
      text-align: right;
    }

    .meta-tod {
      display: inline-block;
      width: 22px;
      text-align: right;
    }

    .meta-dow {
      display: inline-block;
      text-align: right;
    }

    .quest-detail {
      font-size: 10px;
      color: #555;
      padding: 3px 0 2px 20px;
    }

    .saga-progress { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; }
    .saga-progress-bar { flex: 1; height: 8px; background: #fff; border: 1px solid #444; display: block; }
    .saga-progress-fill { display: block; height: 100%; background: #55cc55; }
    .saga-progress-text { font-size: 9px; color: #555; flex-shrink: 0; }

    .saga-celebration {
      padding: 8px 12px;
      font-size: 13px;
      color: #7a5500;
      background: #eea80022;
      border-left: 3px solid #eea800;
      margin: 4px 0;
    }
    .saga-celebration.pulsing {
      animation: saga-pulse 3s ease-out;
    }
    @keyframes saga-pulse {
      0% { background: #eea80044; }
      70% { background: #eea80044; }
      100% { background: #eea80022; }
    }

    .saga-steps { padding-left: 16px; border-left: 2px solid #666; margin: 4px 0 4px 8px; }
    .saga-step-form { display: flex; gap: 4px; padding: 4px 0; align-items: center; font-size: 11px; }
    .saga-step-form input[type="text"] { flex: 1; }
    .step-list { list-style: none; padding: 0; margin: 0; }
    .step-item { padding: 2px 0; }
    .step-number { font-size: 10px; color: #777; width: 20px; flex-shrink: 0; text-align: right; }

    .dow-dropdown {
      position: relative;
      display: inline-block;
      vertical-align: middle;
    }
    .dow-dropdown .dow-trigger {
      cursor: pointer;
      font-size: inherit;
      padding: 2px 4px;
      min-width: 55px;
      text-align: left;
    }
    .dow-dropdown .dow-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 10;
      background: #222;
      border: 2px outset #888;
      padding: 4px;
      white-space: nowrap;
    }
    .dow-dropdown.open .dow-menu {
      display: block;
    }
    .dow-dropdown .dow-menu label {
      display: block;
      cursor: pointer;
      padding: 1px 4px;
      font-size: 11px;
      color: #b4b4b4;
    }
    .dow-dropdown .dow-menu label:hover,
    .dow-dropdown .dow-menu label:focus-within {
      background: #444;
    }

    .action-btn {
      font-size: 13px;
      padding: 2px 6px;
      min-width: 24px;
      text-align: center;
    }

    /* Quest edit */
    .quest-edit {
      padding: 5px 8px;
      border-bottom: 1px solid #999;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quest-edit input[type="text"] { flex: 1; }
    .quest-edit input[type="number"] { width: 55px; }

    .edit-hint { font-size: 9px; color: #777; }

    .close-x {
      color: #777;
      cursor: pointer;
      font-size: 13px;
      padding: 0 2px;
    }
    .close-x:hover { color: #992200; }

    .add-x {
      color: #777;
      cursor: pointer;
      padding: 0 2px;
    }
    .add-x:hover { color: #1a6e1a; }

    /* Quest states */
    .quest-due .quest-title { color: #111; }
    .quest-cooldown .quest-title { color: #777; }
    .quest-cooldown .quest-meta { color: #777; }
    .quest-cooldown .quest-last-done { color: #777; }
    .quest-cooldown .quest-links { color: #777; }
    .quest-cooldown .quest-detail { color: #777; }

    .quest-inactive { opacity: 0.4; }
    .quest-inactive .quest-title { color: #777; cursor: default; }

    /* Completions */
    .completion-item {
      padding: 4px 8px;
      border-bottom: 1px solid #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .completion-title { flex: 1; text-decoration: line-through; color: #777; }
    .completion-time { color: #555; font-size: 10px; }

    .empty-state { color: #777; font-style: italic; padding: 16px 0; }

    .hidden { display: none !important; }

    /* Drag and drop */
    .quest-item.dragging, .meter-row.dragging { opacity: 0.3; }
    body.is-dragging { -webkit-user-select: none; user-select: none; cursor: grabbing; }
    .quest-item.drop-above, .meter-row.drop-above { border-top: 2px solid #444; }
    .quest-item.drop-below, .meter-row.drop-below { border-bottom: 2px solid #444; }

    /* Link tags */
    .link-tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 0;
      align-items: center;
    }

    .link-tags-row .link-group-label { font-size: 10px; color: #555; margin-right: 2px; }
    .link-tags-row .link-separator { width: 8px; }

    .link-tag {
      font-family: inherit;
      font-size: 10px;
      padding: 2px 6px;
      background: #ccc;
      border: 1px solid #888;
      color: #555;
      cursor: pointer;
    }

    .link-tag.selected { border-color: #444; color: #111; background: #ddd; }
    .link-tag:hover { border-color: #666; color: #333; }

    #add-links-row { margin-bottom: 12px; }

    #filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      margin-bottom: 4px;
      font-size: 10px;
    }
    #filter-bar select {
      font-size: 10px;
    }
    #filter-bar label {
      font-size: 10px;
      white-space: nowrap;
    }
    #filter-bar button {
      font-size: 10px;
      padding: 1px 6px;
    }

    .quest-links { font-size: 10px; color: #666; width: 180px; text-align: right; overflow-wrap: break-word; flex-shrink: 0; }
    .quest-edit-links { padding: 2px 8px 6px 8px; border-bottom: 1px solid #999; }

    /* XP display */
    .completion-xp { font-size: 10px; color: #1a6e1a; }
    .xp-flash { font-size: 11px; color: #1a6e1a; font-weight: 700; margin-left: 4px; }

    /* Nav */
    .nav {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid #888;
      outline: 1px solid #444;
      margin-bottom: 0;
    }
    .nav button { padding: 4px 12px; font-size: 11px; }
    .nav button.active { border-style: inset; background: #ccc; }
    .nav button.locked { opacity: 0.4; cursor: not-allowed; }

    .battle-lock-msg {
      font-size: 9px;
      color: #992200;
      text-align: center;
      padding: 2px 0;
      animation: fade-in-up 0.5s ease-out;
    }

    /* Toggle switch */
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 11px;
    }

    .toggle input { display: none; }

    .toggle-slider {
      width: 36px;
      height: 18px;
      background: #666;
      border: 2px outset #888;
      position: relative;
      flex-shrink: 0;
    }

    .toggle-slider::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: #b4b4b4;
      border: 1px outset #ccc;
      top: 2px;
      left: 2px;
      transition: left 0.15s;
    }

    .toggle input:checked + .toggle-slider {
      background: #1a6e1a;
    }

    .toggle input:checked + .toggle-slider::after {
      left: 20px;
    }

    .toggle-label { color: #666; }
    .toggle-label.active { color: #111; font-weight: 700; }

    .content-box {
      border: 1px solid #888;
      outline: 1px solid #444;
      padding: 12px;
      margin-top: -1px;
    }

    /* Character view */
    #character-view { font-size: 13px; }

    .char-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

    .char-name {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #111;
    }

    .char-level { color: #555; font-size: 11px; }

    .char-rename-input {
      background: #ccc;
      border: 1px inset #888;
      color: #111;
      font-family: inherit;
      font-size: 14px;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .char-section { margin-bottom: 16px; }

    .char-row { display: flex; padding: 3px 8px; gap: 8px; font-size: 11px; }
    .char-row-name { width: 140px; color: #111; }
    .char-row-level { width: 50px; color: #555; }
    .char-row-xp { width: 110px; color: #666; font-size: 10px; }
    .char-row-attr { color: #666; font-size: 10px; }

    .accomplishment-row { padding: 4px 0; border-bottom: 1px solid #ccc; }
    .accomplishment-name { font-size: 11px; color: #111; }
    .accomplishment-detail { font-size: 9px; color: #666; display: flex; gap: 8px; align-items: center; }
    .accomplishment-detail .del-x { font-size: 9px; color: #999; cursor: pointer; background: none; border: none; padding: 0 2px; }
    .accomplishment-detail .del-x:hover { color: #c00; }

    /* Reset / Settings sections */
    .reset-section {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #888;
      display: flex;
      gap: 8px;
    }

    .reset-section button { font-size: 10px; color: #555; }
    .reset-section button:hover { color: #992200; }
    .reset-section button.confirm { color: #992200; border-color: #992200; }
    button.confirm { color: #992200; border-color: #992200; }

    /* Quest Giver view */
    #quest-giver-view {
    }

    .qg-lane { margin-bottom: 4px; border-bottom: 1px solid #999; padding-bottom: 8px; }
    .qg-lane-header { font-size: 12px; font-weight: 700; color: #444; padding: 4px 8px; background: #c0c0c0; }
    .qg-lane-content { }

    /* Split layout */
    .qg-split {
      display: flex;
      min-height: 160px;
      padding-top: 16px;
    }

    .qg-split-image {
      padding: 0;
      min-width: 180px;
    }

    .qg-split-image img {
      image-rendering: pixelated;
      width: 170px;
      height: auto;
      display: block;
      border: 1px solid #888;
      outline: 1px solid #444;
    }

    .qg-split-text {
      flex: 1;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .qg-flavor {
      font-size: 11px;
      color: #555;
      margin-bottom: 10px;
      line-height: 1.4;
      font-style: italic;
    }

    .qg-prompt {
      font-size: 10px;
      color: #555;
      margin-bottom: 8px;
    }

    .qg-debug {
      font-size: 9px;
      font-family: monospace;
      color: #777;
      margin: 4px 0;
    }

    .qg-saga-name {
      font-size: 10px;
      color: #777;
    }

    .qg-quest-name {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .qg-actions { display: flex; gap: 10px; }
    .qg-actions button { padding: 6px 16px; font-size: 12px; }

    .qg-empty {
      color: #777;
      font-style: italic;
      font-size: 13px;
      text-align: center;
      padding: 60px 0;
    }

    .qg-xp-flash {
      font-size: 12px;
      color: #1a6e1a;
      font-weight: 700;
      margin-top: 4px;
    }

    .qg-xp-flash:empty { display: none; }

    .qg-timer {
      font-size: 64px;
      color: #333;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-left: 1px solid #999;
      min-width: 280px;
    }

    @keyframes timer-flash {
      0% { color: #fff; }
      30% { color: #fff; }
      100% { color: #333; }
    }

    .qg-timer.flashing {
      animation: timer-flash 1s ease-out;
    }

    /* Completion flash — row highlight for quest list */
    @keyframes row-flash {
      0% { background: var(--flash-color); }
      70% { background: var(--flash-color); }
      100% { background: transparent; }
    }

    .quest-item.flashing {
      animation: row-flash 3s ease-out;
    }

    /* Completion animations for Quest Giver */
    @keyframes text-highlight {
      0% { color: #fff; }
      30% { color: #fff; }
      100% { color: #111; }
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(6px); }
      30% { opacity: 1; transform: translateY(0); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .qg-quest-name.pulsing {
      animation: text-highlight 1.5s ease-out;
    }

    .qg-xp-flash.pulsing {
      animation: fade-in-up 1.5s ease-out;
    }

    .qg-content-fading {
      animation: fade-out 0.4s ease-out forwards;
    }

    .level-up-text {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
      animation: fade-in-up 1.5s ease-out;
    }

    /* Progress meters */
    .meter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 8px;
    }

    .meter-label { width: 110px; font-size: 11px; flex-shrink: 0; }

    .meter-level { width: 38px; font-size: 10px; flex-shrink: 0; text-align: right; }

    .meter-bar-bg {
      width: 150px;
      flex-shrink: 0;
      height: 10px;
      background: #fff;
      border: 1px solid #444;
    }

    .meter-bar-fill { height: 100%; }

    .meter-text {
      font-size: 10px;
      color: #555;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .meter-row:focus { outline: 1px solid #444; outline-offset: -1px; }

    .meter-label-clickable { cursor: pointer; }
    .meter-label-clickable:hover { color: #333; }

    .meter-edit {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 8px;
    }

    .meter-edit input[type="text"] { width: 130px; }

    .meter-actions { display: flex; gap: 4px; margin-left: auto; }

    .add-row {
      padding: 3px 8px;
    }
  </style>
</head>
<body>
<div class="app-border">
<div class="app-inner">
  <div class="nav">
    <button id="nav-quest-giver" class="active" onclick="showView('quest-giver')"> Next Quest </button>
    <button id="nav-quests" onclick="showView('quests')">Quest List</button>
    <button id="nav-sagas" onclick="showView('sagas')">Sagas</button>
    <button id="nav-campaigns" onclick="showView('campaigns')">Campaigns</button>
    <button id="nav-character" onclick="showView('character')">Character</button>
    <button id="nav-settings" onclick="showView('settings')">Settings</button>
  </div>

  <div class="content-box">
  <div id="quest-giver-view">
    <div id="qg-timer-content" class="hidden"></div>
    <div id="qg-lane1" class="qg-lane">
      <div class="qg-lane-header">Castle Duties</div>
      <div class="qg-lane-content"></div>
    </div>
    <div id="qg-lane2" class="qg-lane">
      <div class="qg-lane-header">Adventures</div>
      <div class="qg-lane-content"></div>
    </div>
    <div id="qg-lane3" class="qg-lane">
      <div class="qg-lane-header">Royal Quests</div>
      <div class="qg-lane-content"></div>
    </div>
  </div>

  <div id="quests-view" class="hidden">

  <form id="add-form">
    <input type="text" id="quest-title" placeholder="Quest name..." autofocus>
    <select id="quest-type" onchange="toggleCycleInput()">
      <option value="recurring">Recurring</option>
      <option value="one_off">One-off</option>
    </select>
    <label id="cycle-label">
      Days
      <input type="number" id="quest-cycle" value="1" min="1">
    </label>
    <select id="quest-difficulty">
      <option value="trivial">Trivial</option>
      <option value="easy" selected>Easy</option>
      <option value="moderate">Fair</option>
      <option value="challenging">Hard</option>
      <option value="epic">Epic</option>
    </select>
    <select id="quest-importance" title="Importance">
      <option value="0" selected>—</option>
      <option value="1">!</option>
      <option value="2">!!</option>
      <option value="3">!!!</option>
      <option value="4">!!!!</option>
      <option value="5">!!!!!</option>
    </select>
    <span id="add-tod" class="dow-dropdown"></span>
    <span id="add-dow" class="dow-dropdown"></span>
    <button type="button" id="toggle-links-btn" onclick="toggleAddLinks()">Tags</button>
    <button type="submit">Add</button>
  </form>

  <div id="add-links-row" class="hidden"></div>

  <div id="filter-bar">
    <select id="filter-attr" onchange="applyFilters()"></select>
    <select id="filter-skill" onchange="applyFilters()"></select>
    <select id="filter-tod" onchange="applyFilters()">
      <option value="">All Times</option>
      <option value="1">Morning</option>
      <option value="2">Afternoon</option>
      <option value="4">Evening</option>
      <option value="8">Night</option>
    </select>
    <select id="filter-dow" onchange="applyFilters()">
      <option value="">All Days</option>
      <option value="0">Mon</option>
      <option value="1">Tue</option>
      <option value="2">Wed</option>
      <option value="3">Thu</option>
      <option value="4">Fri</option>
      <option value="5">Sat</option>
      <option value="6">Sun</option>
    </select>
    <label id="filter-due-label"><input type="checkbox" id="filter-due" onchange="applyFilters()"> Due</label>
    <button type="button" onclick="clearFilters()">Clear</button>
  </div>

  <ul id="quest-list"></ul>
  </div>

  <div id="sagas-view" class="hidden">
  <form id="saga-add-form">
    <input type="text" id="saga-name" placeholder="Saga name..." autofocus>
    <select id="saga-type" onchange="toggleSagaCycleInput()">
      <option value="recurring">Recurring</option>
      <option value="one_off">One-off</option>
    </select>
    <label id="saga-cycle-label">
      Days
      <input type="number" id="saga-cycle" value="1" min="1" style="width: 55px;">
    </label>
    <button type="submit">Add</button>
  </form>
  <ul id="saga-list"></ul>
  </div>

  <div id="campaigns-view" class="hidden">
  <button id="campaign-add-btn" onclick="showCampaignForm()">Add Campaign</button>
  <div id="campaign-form" class="hidden" style="margin-bottom: 8px;">
    <input type="text" id="campaign-name" placeholder="Campaign name...">
    <div id="campaign-criteria-list" style="margin: 4px 0;"></div>
    <div style="display: flex; gap: 4px; align-items: center; margin: 4px 0;">
      <select id="campaign-target-select"><option value="">-- Select --</option></select>
      <input type="number" id="campaign-target-count" value="1" min="1" style="width: 50px;">
      <button type="button" onclick="addCampaignCriterion()">Add</button>
    </div>
    <div id="campaign-form-error" style="color: #c44; font-size: 10px; display: none;"></div>
    <div style="margin-top: 4px;">
      <button type="button" id="campaign-save-btn" onclick="saveCampaign()" disabled>Save</button>
      <button type="button" onclick="cancelCampaignForm()">Cancel</button>
    </div>
  </div>
  <ul id="campaign-list"></ul>
  </div>

  <div id="character-view" class="hidden">
    <div id="char-content"></div>
    <h2><span class="expand-toggle" onclick="toggleHistory(this)" style="font-size:10px; cursor:pointer; color:#777">▸</span> History</h2>
    <ul id="completion-list" style="display:none"></ul>
  </div>

  <div id="settings-view" class="hidden">
    <h1>Settings</h1>

    <h2>Encounters</h2>
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
      <label class="toggle">
        <span class="toggle-label" id="cta-label-off">Off</span>
        <input type="checkbox" id="cta-toggle" onchange="toggleCTA()">
        <span class="toggle-slider"></span>
        <span class="toggle-label" id="cta-label-on">On</span>
      </label>
    </div>
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
      <label>Interval (minutes)
        <input type="number" id="cta-interval" value="20" min="1" style="width: 55px;">
      </label>
      <button onclick="saveCTAInterval()">Save</button>
    </div>

    <h2>Debug</h2>
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
      <label class="toggle">
        <span class="toggle-label">Off</span>
        <input type="checkbox" id="debug-toggle" onchange="toggleDebugScoring()">
        <span class="toggle-slider"></span>
        <span class="toggle-label">On</span>
      </label>
      <span style="font-size: 10px; color: #555;">Show scoring in quest giver</span>
    </div>

    <h2>Reset</h2>
    <div class="reset-section" style="margin-top: 8px; border-top: none; padding-top: 0;">
      <button onclick="resetWithConfirm(this, 'reset_character', loadCharacterView)">Reset Char</button>
      <button onclick="resetWithConfirm(this, 'reset_quests', loadAll)">Reset Quests</button>
      <button onclick="resetWithConfirm(this, 'reset_completions', loadAll)">Reset History</button>
    </div>
  </div>
  </div><!-- content-box -->
</div><!-- app-inner -->
</div><!-- app-border -->

  <script>
    const { invoke } = window.__TAURI__.core;

    const questList = document.getElementById("quest-list");
    const completionList = document.getElementById("completion-list");
    const addForm = document.getElementById("add-form");
    const titleInput = document.getElementById("quest-title");
    const typeSelect = document.getElementById("quest-type");
    const cycleInput = document.getElementById("quest-cycle");
    const cycleLabel = document.getElementById("cycle-label");
    const difficultySelect = document.getElementById("quest-difficulty");
    const importanceSelect = document.getElementById("quest-importance");
    const addTodContainer = document.getElementById("add-tod");
    const addDowContainer = document.getElementById("add-dow");
    const addLinksRow = document.getElementById("add-links-row");

    const TOD_LABELS = ["AM", "PM", "EV", "NT"];
    const TOD_FULL = ["Morning", "Afternoon", "Evening", "Night"];

    function todSummary(mask) {
      if (mask === 15 || mask === 0) return "Time ▾";
      const times = TOD_LABELS.filter((_, i) => mask & (1 << i));
      return times.join(" ") + " ▾";
    }

    function todText(mask) {
      if (mask === 15 || mask === 0) return "";
      return TOD_LABELS.filter((_, i) => mask & (1 << i)).join(" ");
    }

    const DOW_LABELS = ["M", "Tu", "W", "Th", "F", "Sa", "Su"];
    const DOW_FULL = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    function dowSummary(mask) {
      if (mask === 127 || mask === 0) return "Days ▾";
      const days = DOW_LABELS.filter((_, i) => mask & (1 << i));
      return days.join(" ") + " ▾";
    }

    function dowText(mask) {
      if (mask === 127 || mask === 0) return "";
      return DOW_LABELS.filter((_, i) => mask & (1 << i)).join(" ");
    }

    function renderCheckDropdown(container, mask, labels, summaryFn) {
      const trigger = document.createElement("button");
      trigger.type = "button";
      trigger.className = "dow-trigger";
      trigger.textContent = summaryFn(mask);

      const menu = document.createElement("div");
      menu.className = "dow-menu";

      labels.forEach((label, i) => {
        const lbl = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!(mask & (1 << i));
        cb.onchange = () => {
          trigger.textContent = summaryFn(readMask(container));
        };
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(" " + label));
        menu.appendChild(lbl);
      });

      trigger.onclick = (e) => {
        e.stopPropagation();
        container.classList.toggle("open");
        if (container.classList.contains("open")) {
          const first = menu.querySelector("input");
          if (first) first.focus();
        }
      };

      menu.onkeydown = (e) => {
        if (e.key === "Escape") {
          container.classList.remove("open");
          trigger.focus();
        }
      };

      container.innerHTML = "";
      container.appendChild(trigger);
      container.appendChild(menu);
    }

    function readMask(container) {
      let mask = 0;
      container.querySelectorAll("input[type=checkbox]").forEach((cb, i) => {
        if (cb.checked) mask |= (1 << i);
      });
      return mask;
    }

    document.addEventListener("click", (e) => {
      document.querySelectorAll(".dow-dropdown.open").forEach(dd => {
        if (!dd.contains(e.target)) dd.classList.remove("open");
      });
    });

    renderCheckDropdown(addTodContainer, 15, TOD_FULL, todSummary);
    renderCheckDropdown(addDowContainer, 127, DOW_FULL, dowSummary);

    // Difficulty color maps (text variants for WCAG AA on #b4b4b4)
    const diffTextColors = {
      "trivial": "#2244aa",
      "easy": "#1a6e1a",
      "moderate": "#7a5500",
      "challenging": "#992200",
      "epic": "#5c2d80",
    };

    // Attribute text colors (dark variants for WCAG AA)
    // Cycling color palette: fill colors first, then text variants
    const fillPalette = ["#ff6633", "#eea800", "#4466cc", "#55cc55", "#8844aa"];
    const textPalette = ["#992200", "#7a5500", "#2244aa", "#1a6e1a", "#5c2d80"];
    const fullPalette = [...fillPalette, ...textPalette];

    function attrFillColor(index) {
      if (index < 0) return "#888";
      return fullPalette[index % fullPalette.length];
    }

    function attrTextColor(index) {
      if (index < 0) return "#333";
      return index < textPalette.length ? textPalette[index] : fullPalette[index % fullPalette.length];
    }

    // Maps rebuilt on each loadAll — keyed by attribute ID
    let attrIndexById = {};

    function levelUpColor(name) {
      // Find index by name from cached attributes, fall back to skill→attribute lookup
      const attr = cachedAttributes.find(a => a.name === name);
      if (attr) return attrTextColor(cachedAttributes.indexOf(attr));
      const skill = cachedSkills.find(s => s.name === name);
      if (skill && skill.attribute_id) {
        const attrIdx = cachedAttributes.findIndex(a => a.id === skill.attribute_id);
        if (attrIdx >= 0) return attrTextColor(attrIdx);
      }
      return "#333";
    }

    function levelUpHtml(levelUps) {
      if (!levelUps || levelUps.length === 0) return "";
      return levelUps.map(lu =>
        `<div class="level-up-text" style="color: ${levelUpColor(lu.name)}">${lu.name} reached Level ${lu.new_level}!</div>`
      ).join("");
    }

    function campaignCelebrationHtml(results) {
      if (!results) return "";
      return results.filter(r => r.completed).map(r => {
        let html = `<div class="saga-celebration pulsing" style="margin-top: 8px;">`;
        html += `<strong>${escapeHtml(r.campaignName)} complete!</strong>`;
        if (r.bonusXp > 0) {
          html += ` <span class="xp-flash" style="color: #7a5500">+${r.bonusXp} bonus XP</span>`;
        }
        if (r.levelUps?.length > 0) {
          html += levelUpHtml(r.levelUps);
        }
        html += `</div>`;
        return html;
      }).join("");
    }

    // Image and flavor text pools (loaded at startup)
    let questGiverImages = [];
    let monsterImages = [];
    let victoryImages = [];
    let defeatImages = [];
    let lane1Images = [];
    let lane2Images = [];
    let lane3Images = [];

    let questGiverLines = [
      "Word has reached the guild of a task requiring attention...",
    ];
    let lane1Lines = ["Word has reached the guild of a task requiring attention..."];
    let lane2Lines = ["A task awaits beyond the walls..."];
    let lane3Lines = ["The realm has need of you..."];

    let encounterLines = [
      "A trial lays before you...",
    ];

    async function loadPools() {
      try {
        const [qgText, encText, l1Text, l2Text, l3Text, manifestText] = await Promise.all([
          fetch("text/quest-giver-lines.txt").then(r => r.text()),
          fetch("text/encounter-lines.txt").then(r => r.text()),
          fetch("text/lane1/quest-giver-lines.txt").then(r => r.text()),
          fetch("text/lane2/quest-giver-lines.txt").then(r => r.text()),
          fetch("text/lane3/quest-giver-lines.txt").then(r => r.text()),
          fetch("images/manifest.json").then(r => r.json()),
        ]);
        const qgLines = qgText.split("\n").map(l => l.trim()).filter(l => l);
        const encLines = encText.split("\n").map(l => l.trim()).filter(l => l);
        if (qgLines.length > 0) questGiverLines = qgLines;
        if (encLines.length > 0) encounterLines = encLines;
        const l1 = l1Text.split("\n").map(l => l.trim()).filter(l => l);
        const l2 = l2Text.split("\n").map(l => l.trim()).filter(l => l);
        const l3 = l3Text.split("\n").map(l => l.trim()).filter(l => l);
        if (l1.length > 0) lane1Lines = l1;
        if (l2.length > 0) lane2Lines = l2;
        if (l3.length > 0) lane3Lines = l3;
        questGiverImages = manifestText["quest-givers"] || [];
        lane1Images = manifestText["lane1"] || [];
        lane2Images = manifestText["lane2"] || [];
        lane3Images = manifestText["lane3"] || [];
        monsterImages = manifestText["monsters"] || [];
        victoryImages = manifestText["victory"] || [];
        defeatImages = manifestText["defeat"] || [];
      } catch (e) {
        console.error("Failed to load pools:", e);
      }
    }

    function randomFromExcluding(arr, previous) {
      if (!arr || arr.length === 0) return null;
      if (arr.length === 1) return arr[0];
      let pick;
      do { pick = arr[Math.floor(Math.random() * arr.length)]; }
      while (pick === previous);
      return pick;
    }

    let currentQGImage = null; // legacy, used by timer
    let currentQGLine = null; // legacy, used by timer
    const laneConfig = [
      { key: "castle_duties", containerId: "qg-lane1", emptyText: "The walls are secure." },
      { key: "adventures", containerId: "qg-lane2", emptyText: "I haven't heard any new rumors." },
      { key: "royal_quests", containerId: "qg-lane3", emptyText: "The realm is at peace." },
    ];
    const laneImages = { castle_duties: null, adventures: null, royal_quests: null };
    const laneLines = { castle_duties: null, adventures: null, royal_quests: null };
    const laneCurrentQuestId = { castle_duties: null, adventures: null, royal_quests: null };

    function getLaneImagePool(key) {
      if (key === "castle_duties") return lane1Images.length > 0 ? lane1Images : questGiverImages;
      if (key === "adventures") return lane2Images.length > 0 ? lane2Images : questGiverImages;
      if (key === "royal_quests") return lane3Images.length > 0 ? lane3Images : questGiverImages;
      return questGiverImages;
    }
    function getLaneLinePool(key) {
      if (key === "castle_duties") return lane1Lines;
      if (key === "adventures") return lane2Lines;
      if (key === "royal_quests") return lane3Lines;
      return lane1Lines;
    }
    let currentMonsterImage = null;
    let currentEncounterLine = null;

    let editingId = null;
    let cachedQuests = [];
    let draggedId = null;
    let cachedSkills = [];
    let cachedAttributes = [];
    let skillNameMap = {};
    let attrNameMap = {};

    // Quest Giver state
    // Skip tracking now lives in backend (AppSkipState)

    // Break timer state (display only — state lives in backend)
    let timerStartLocal = null;   // Date.now() cached locally for display
    let timerTitleLocal = null;   // cached quest title for display
    let timerInterval = null;     // setInterval handle
    let debugScoring = false;
    let questScoreMap = {}; // quest_id → ScoredQuest, populated when debugScoring is on

    function formatScoreDebug(s) {
      return `Score: ${s.score.toFixed(2)} (overdue: ${s.overdue_ratio.toFixed(2)} | importance: +${s.importance_boost.toFixed(1)} | order: +${s.list_order_bonus.toFixed(2)} | member: +${s.membership_bonus.toFixed(1)} | balance: +${s.balance_bonus.toFixed(1)} | skips: -${s.skip_penalty.toFixed(1)}) [${s.pool}]`;
    }

    // Filter state
    const filterAttr = document.getElementById("filter-attr");
    const filterSkill = document.getElementById("filter-skill");
    const filterTod = document.getElementById("filter-tod");
    const filterDow = document.getElementById("filter-dow");
    const filterDue = document.getElementById("filter-due");

    function populateFilterDropdowns() {
      const attrVal = filterAttr.value;
      const skillVal = filterSkill.value;
      filterAttr.innerHTML = '<option value="">All Attributes</option>' +
        cachedAttributes.map(a => `<option value="${a.id}">${escapeHtml(a.name)}</option>`).join("");
      filterSkill.innerHTML = '<option value="">All Skills</option>' +
        cachedSkills.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join("");
      filterAttr.value = attrVal;
      filterSkill.value = skillVal;
    }

    function applyFilters() {
      renderQuests(cachedQuests);
    }

    function clearFilters() {
      filterAttr.value = "";
      filterSkill.value = "";
      filterTod.value = "";
      filterDow.value = "";
      filterDue.checked = false;
      applyFilters();
    }

    function passesFilters(q) {
      if (filterAttr.value && !(q.attribute_ids || []).includes(filterAttr.value)) return false;
      if (filterSkill.value && !(q.skill_ids || []).includes(filterSkill.value)) return false;
      if (filterTod.value) {
        const bit = parseInt(filterTod.value, 10);
        const mask = q.time_of_day ?? 15;
        if (mask !== 15 && mask !== 0 && !(mask & bit)) return false;
      }
      if (filterDow.value !== "") {
        const day = parseInt(filterDow.value, 10);
        const mask = q.days_of_week ?? 127;
        if (!(mask & (1 << day))) return false;
      }
      if (filterDue.checked && !q.is_due) return false;
      return true;
    }

    function toggleCycleInput() {
      cycleLabel.classList.toggle("hidden", typeSelect.value === "one_off");
    }

    function toggleAddLinks() {
      addLinksRow.classList.toggle("hidden");
    }

    function renderAddLinkTags() {
      addLinksRow.innerHTML = renderLinkTagsHtml("add", [], []);
    }

    function renderLinkTagsHtml(prefix, selectedSkillIds, selectedAttrIds) {
      const skillTags = cachedSkills.map(s => {
        const sel = selectedSkillIds.includes(s.id) ? "selected" : "";
        return `<button type="button" class="link-tag ${sel}"
                  data-id="${s.id}" data-kind="skill"
                  onclick="toggleLinkTag(this)">${escapeHtml(s.name)}</button>`;
      }).join("");

      const attrTags = cachedAttributes.map(a => {
        const sel = selectedAttrIds.includes(a.id) ? "selected" : "";
        return `<button type="button" class="link-tag ${sel}"
                  data-id="${a.id}" data-kind="attr"
                  onclick="toggleLinkTag(this)">${escapeHtml(a.name)}</button>`;
      }).join("");

      return `<div class="link-tags-row">
        <span class="link-group-label">Skills</span>${skillTags}
        <span class="link-separator"></span>
        <span class="link-group-label">Attrs</span>${attrTags}
      </div>`;
    }

    function toggleLinkTag(btn) {
      btn.classList.toggle("selected");
    }

    function getSelectedLinkIds(container) {
      const skillIds = [];
      const attributeIds = [];
      container.querySelectorAll(".link-tag.selected").forEach(btn => {
        if (btn.dataset.kind === "skill") skillIds.push(btn.dataset.id);
        else attributeIds.push(btn.dataset.id);
      });
      return { skillIds, attributeIds };
    }

    function linkNamesText(q) {
      const names = [];
      q.skill_ids.forEach(id => { if (skillNameMap[id]) names.push(skillNameMap[id]); });
      q.attribute_ids.forEach(id => { if (attrNameMap[id]) names.push(attrNameMap[id]); });
      return names.join(", ");
    }

    async function loadAll() {
      const fetches = [invoke("get_quests"), invoke("get_completions"), invoke("get_campaigns")];
      if (cachedSkills.length === 0) {
        fetches.push(invoke("get_skills"), invoke("get_attributes"));
      }
      const results = await Promise.all(fetches);
      const extraStart = 3; // index where skills/attributes start
      if (results.length === 5) {
        cachedSkills = results[extraStart];
        cachedAttributes = results[extraStart + 1];
        skillNameMap = {};
        attrNameMap = {};
        cachedSkills.forEach(s => skillNameMap[s.id] = s.name);
        cachedAttributes.forEach(a => attrNameMap[a.id] = a.name);
        attrIndexById = {};
        cachedAttributes.forEach((a, i) => { attrIndexById[a.id] = i; });
        renderAddLinkTags();
        populateFilterDropdowns();
      }
      renderQuests(results[0]);
      renderCompletions(results[1]);
      cachedCampaigns = results[2];
      if (!campaignsView.classList.contains("hidden")) {
        renderCampaigns();
      }
      if (!questGiverView.classList.contains("hidden")) {
        renderQuestGiver();
      }
      // Load quest scores for debug display (all lanes)
      if (debugScoring) {
        const [s1, s2, s3] = await Promise.all([
          invoke("get_quest_scores", { lane: "castle_duties" }),
          invoke("get_quest_scores", { lane: "adventures" }),
          invoke("get_quest_scores", { lane: "royal_quests" }),
        ]);
        questScoreMap = {};
        [...s1, ...s2, ...s3].forEach(s => { questScoreMap[s.quest.id] = s; });
      } else {
        questScoreMap = {};
      }
    }

    function renderQuests(quests) {
      cachedQuests = quests;

      const filtered = quests.filter(passesFilters);

      if (filtered.length === 0) {
        questList.innerHTML = quests.length === 0
          ? '<li class="empty-state">No quests yet. Add one above.</li>'
          : '<li class="empty-state">No quests match filters.</li>';
        return;
      }

      questList.innerHTML = filtered
        .map(q => editingId === q.id ? renderEditMode(q) : renderQuestRow(q))
        .join("");

      if (editingId) {
        const el = document.getElementById("edit-title");
        if (el) el.focus();
        const editQuest = quests.find(q => q.id === editingId);
        if (editQuest) {
          const editTod = document.getElementById("edit-tod");
          if (editTod) renderCheckDropdown(editTod, editQuest.time_of_day ?? 15, TOD_FULL, todSummary);
          const editDow = document.getElementById("edit-dow");
          if (editDow) renderCheckDropdown(editDow, editQuest.days_of_week ?? 127, DOW_FULL, dowSummary);
        }
      }
    }

    function difficultyLabel(d) {
      const labels = { trivial: "Trivial", easy: "Easy", moderate: "Fair", challenging: "Hard", epic: "Epic" };
      return labels[d] || d;
    }

    function toggleDetail(el) {
      const li = el.closest(".quest-item");
      const detail = li.querySelector(".quest-detail");
      if (!detail) return;
      const hidden = detail.style.display === "none";
      detail.style.display = hidden ? "block" : "none";
      el.textContent = hidden ? "▾" : "▸";
    }

    function renderQuestRow(q) {
      const cycleText = q.quest_type === "recurring"
        ? `↻ ${q.cycle_days}d`
        : "One-off";

      const todDisplay = todText(q.time_of_day ?? 15);

      let stateClass;
      if (!q.active) {
        stateClass = "quest-inactive";
      } else if (q.is_due) {
        stateClass = "quest-due";
      } else {
        stateClass = "quest-cooldown";
      }

      const lastDone = q.last_completed ? formatTimestamp(q.last_completed) : "";
      const lastDoneDate = q.last_completed ? q.last_completed.substring(0, 10) : "";

      const links = linkNamesText(q);
      const dowLabel = dowText(q.days_of_week ?? 127);
      const hasDetail = !!links;

      const diffColor = q.is_due ? (diffTextColors[q.difficulty] || '#555') : '#777';

      const lastDonePicker = q.active
        ? `<span class="last-done-picker-wrap">
            <span class="last-done-picker-icon" onclick="this.nextElementSibling.showPicker()" title="Set last-done date">&#x270E;</span>
            <input type="date" class="last-done-picker-input" value="${lastDoneDate}" max="${new Date().toISOString().substring(0, 10)}" onchange="setLastDone('${q.id}', this.value)">
          </span>`
        : "";

      const questNowBtn = q.active
        ? `<button class="action-btn" onclick="listQuestNow('${q.id}')">⚔</button>`
        : "";

      const doneBtn = q.active
        ? `<button class="action-btn done-btn" onclick="completeQuest('${q.id}')">✓</button>`
        : "";

      return `<li class="quest-item ${stateClass}" data-id="${q.id}" tabindex="0"
                  onkeydown="handleQuestKey(event, '${q.id}', '${escapeAttr(q.title)}')"
                  onpointerdown="${q.active ? `onPointerDown(event, '${q.id}')` : ''}">
        <div class="quest-row-top">
          <span class="expand-toggle" onclick="toggleDetail(this)">${(hasDetail || debugScoring) ? '▸' : ''}</span>
          <span class="quest-title" onclick="startEdit('${q.id}')">${escapeHtml(q.title)}</span>${q.importance > 0 ? `<span class="quest-importance">${"!".repeat(q.importance)}</span>` : ''}
          <span class="quest-meta">
            <span class="meta-dow">${dowLabel}</span>
            <span class="meta-tod">${todDisplay}</span>
            <span class="meta-cycle">${cycleText}</span>
            <span class="meta-difficulty" style="color: ${diffColor}">${difficultyLabel(q.difficulty)}</span>
          </span>
          <span class="quest-last-done">${lastDone}</span>
          ${lastDonePicker}
          ${questNowBtn}
          ${doneBtn}
        </div>
        ${(hasDetail || debugScoring) ? `<div class="quest-detail" style="display:none">${links ? `<span class="quest-links">${escapeHtml(links)}</span>` : ''}${debugScoring && questScoreMap[q.id] ? `<div class="quest-debug">${formatScoreDebug(questScoreMap[q.id])}</div>` : ''}</div>` : ''}
      </li>`;
    }

    function handleQuestKey(e, id, title) {
      if (e.key === "ArrowUp" && e.altKey) {
        e.preventDefault();
        moveQuest(id, -1);

        e.preventDefault();
        moveQuest(id, 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        focusAdjacentQuest(id, -1);
      } else if (e.key === "ArrowDown") {
        e.preventDefault();
        focusAdjacentQuest(id, 1);
      } else if (e.key === "e" || e.key === "E") {
        e.preventDefault();
        startEdit(id);
      } else if (e.key === "Delete" || e.key === "Backspace") {
        e.preventDefault();
        deleteQuest(id, title);
      } else if (e.key === "Enter") {
        e.preventDefault();
        completeQuest(id);
      }

      const quest = cachedQuests.find(q => q.id === id);
      const completion = await invoke("complete_quest", { questId: id });

      // Check saga completion if this is a saga step
      let sagaResult = null;
      if (quest?.saga_id) {
        sagaResult = await invoke("check_saga_completion", { sagaId: quest.saga_id });
      }

      const row = questList.querySelector(`[data-id="${id}"]`);
      if (row) {
        const color = diffTextColors[quest?.difficulty] || "#1a6e1a";
        row.style.setProperty("--flash-color", color + "33");
        row.classList.add("flashing");

        // Show XP and level-ups together below the quest title
        const feedbackDiv = document.createElement("div");
        feedbackDiv.style.marginLeft = "4px";
        let feedbackHtml = "";
        if (completion.xp_earned > 0) {
          feedbackHtml += `<span class="xp-flash" style="color: ${color}">+${completion.xp_earned} XP</span>`;
        }
        if (completion.level_ups?.length > 0) {
          feedbackHtml += levelUpHtml(completion.level_ups);

        if (sagaResult?.completed) {
          feedbackHtml += `<div class="saga-celebration pulsing" style="margin-top: 4px;">`;
          feedbackHtml += `<strong>${escapeHtml(sagaResult.sagaName)} complete!</strong>`;

          }

          feedbackHtml += `</div>`;

      let campaignResults = await invoke("check_campaign_progress", { targetType: "quest_completions", targetId: id });

    function focusAdjacentQuest(id, direction) {
      const items = Array.from(questList.querySelectorAll(".quest-item"));

    async function moveQuest(id, direction) {
      const items = Array.from(questList.querySelectorAll(".quest-item"));
      const idx = items.findIndex(el => el.dataset.id === id);
      const neighborIdx = idx + direction;

      if (neighborIdx < 0 || neighborIdx >= items.length) return;
      if (items[idx].classList.contains("quest-inactive")) return;
      if (items[neighborIdx].classList.contains("quest-inactive")) return;

      const neighborId = items[neighborIdx].dataset.id;
      const moving = cachedQuests.find(q => q.id === id);
      const neighbor = cachedQuests.find(q => q.id === neighborId);
      if (!moving || !neighbor) return;

      await invoke("reorder_quests", {
        orders: [
          { id: moving.id, sort_order: neighbor.sort_order },
          { id: neighbor.id, sort_order: moving.sort_order },
        ]
      });

      await loadAll();
      const movedEl = questList.querySelector(`[data-id="${id}"]`);
      if (movedEl) movedEl.focus();
    }

    let dragStartY = 0;
    let isDragging = false;

    function onPointerDown(e, id) {
      if (e.target.closest("button")) return;
      draggedId = id;
      dragStartY = e.clientY;
      isDragging = false;

      const onMove = (me) => {
        if (!isDragging && Math.abs(me.clientY - dragStartY) > 5) {
          isDragging = true;
          document.body.classList.add("is-dragging");
          window.getSelection()?.removeAllRanges();
          const el = questList.querySelector(`[data-id="${draggedId}"]`);
          if (el) el.classList.add("dragging");
        }
        if (!isDragging) return;

        clearDropIndicators();
        const target = getDropTarget(me.clientY);
        if (target && target.id !== draggedId) {
          const rect = target.el.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          target.el.classList.add(me.clientY < mid ? "drop-above" : "drop-below");
        }
      };

      const onUp = async (ue) => {
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);

        if (!isDragging) { draggedId = null; return; }

        const target = getDropTarget(ue.clientY);
        clearDropIndicators();
        document.body.classList.remove("is-dragging");
        questList.querySelectorAll(".dragging").forEach(el => el.classList.remove("dragging"));

        if (!target || target.id === draggedId) { draggedId = null; return; }

        const activeQuests = cachedQuests.filter(q => q.active);
        const draggedIdx = activeQuests.findIndex(q => q.id === draggedId);
        if (draggedIdx === -1) { draggedId = null; return; }

        const rect = target.el.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        let targetIdx = activeQuests.findIndex(q => q.id === target.id);
        if (ue.clientY >= mid && targetIdx < draggedIdx) targetIdx++;
        if (ue.clientY < mid && targetIdx > draggedIdx) targetIdx--;

        const reordered = [...activeQuests];
        const [moved] = reordered.splice(draggedIdx, 1);
        reordered.splice(targetIdx, 0, moved);

        const sortOrders = activeQuests.map(q => q.sort_order).sort((a, b) => b - a);
        const orders = reordered.map((q, i) => ({ id: q.id, sort_order: sortOrders[i] }));

        await invoke("reorder_quests", { orders });
        draggedId = null;
        isDragging = false;
        await loadAll();
      };

      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    }

    function getDropTarget(clientY) {
      const items = Array.from(questList.querySelectorAll(".quest-item:not(.quest-inactive)"));
      for (const el of items) {
        const rect = el.getBoundingClientRect();
        if (clientY >= rect.top && clientY <= rect.bottom) {
          return { el, id: el.dataset.id };
        }
      }
      return null;
    }

      return `${month}/${day} ${hours}:${mins}`;

    function formatTimer(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = totalSecs % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    async function timerDone() {
      if (timerInterval) clearInterval(timerInterval);
      const finalElapsed = timerStartLocal ? formatTimer(Date.now() - timerStartLocal) : "";
      timerStartLocal = null;
      timerTitleLocal = null;
      timerInterval = null;
      setTabsLocked(false);
      const completion = await invoke("complete_timer");

      // Check saga completion if this was a saga step
      let sagaResult = null;
      const quest = cachedQuests.find(q => q.id === completion.quest_id);
      if (completion.quest_id) {
        sagaResult = await invoke("check_saga_completion_for_quest", { questId: completion.quest_id });
      }

      let textHtml = `<div class="qg-quest-name pulsing" style="font-size: 18px;">${escapeHtml(completion.quest_title)}</div>`;

        textHtml += `<div class="qg-xp-flash pulsing">+${completion.xp_earned} XP</div>`;
      }
      textHtml += levelUpHtml(completion.level_ups);
      if (sagaResult?.completed) {
        textHtml += `<div class="saga-celebration pulsing" style="margin-top: 8px;">`;
        textHtml += `<strong>${escapeHtml(sagaResult.sagaName)} complete!</strong>`;

          textHtml += ` <span class="xp-flash" style="color: #7a5500">+${sagaResult.bonusXp} bonus XP</span>`;

          textHtml += levelUpHtml(sagaResult.levelUps);
        }
        textHtml += `</div>`;
      }

      // Campaign progress
      let campaignResults = [];
      if (completion.quest_id) {
        campaignResults = await invoke("check_campaign_progress", { targetType: "quest_completions", targetId: completion.quest_id });
      }
      if (sagaResult?.completed && quest?.saga_id) {
        const sagaCampaignResults = await invoke("check_campaign_progress", { targetType: "saga_completions", targetId: quest.saga_id });
        campaignResults = campaignResults.concat(sagaCampaignResults);

      textHtml += campaignCelebrationHtml(campaignResults);

      const victoryImg = randomFromExcluding(victoryImages, null) || currentMonsterImage;
      const timerDiv = document.getElementById("qg-timer-content");

        <div class="qg-split">

    async function loadCharacterView() {
      const [character, attributes, skills, accomplishments] = await Promise.all([
        invoke("get_character"),
        invoke("get_attributes"),
        invoke("get_skills"),
        invoke("get_accomplishments"),
      ]);
      cachedAttributes = attributes;
      cachedSkills = skills;
      attrIndexById = {};
      cachedAttributes.forEach((a, i) => { attrIndexById[a.id] = i; });
      populateFilterDropdowns();
      renderCharacterView(character, attributes, skills, accomplishments);
    }

    // Attribute fill colors (bright variants for meter bars)
    function meterPercent(into, total) {
      if (total <= 0) return 0;
      return Math.min(100, Math.round((into / total) * 100));
    }

    function renderCharacterView(character, attributes, skills, accomplishments) {
      const nameHtml = renamingChar
        ? `<input type="text" class="char-rename-input" id="char-name-input"
                  value="${escapeAttr(character.name)}"
                  onkeydown="handleRenameKey(event)">
           <button onclick="saveCharName()">Save</button>
           <button onclick="cancelRename()"> Esc </button>`
        : `<span class="char-name">${escapeHtml(character.name)}</span>
           <button onclick="startRename()">Rename</button>`;

      // Character XP meter uses the color of the highest attribute
      let highestIdx = 0;
      attributes.forEach((a, i) => { if (a.xp > (attributes[highestIdx]?.xp || 0)) highestIdx = i; });
      const charColor = attrFillColor(highestIdx);

      const charMeter = `
        <div class="meter-row">
          <span class="meter-label">Character</span>
          <span class="meter-level">Lvl ${character.level}</span>
          <div class="meter-bar-bg"><div class="meter-bar-fill" style="width: ${meterPercent(character.xp_into_current_level, character.xp_for_current_level)}%; background: ${charColor};"></div></div>
          <span class="meter-text">(${character.xp_into_current_level}/${character.xp_for_current_level})</span>
        </div>`;

      const attrRows = attributes.map((a, i) => {
        const color = attrFillColor(i);
        const pct = meterPercent(a.xp_into_current_level, a.xp_for_current_level);
        if (editingAttrId === a.id) {
          return `<div class="meter-edit">
            <input type="text" id="edit-attr-name" value="${escapeAttr(a.name)}"
                   onkeydown="handleAttrEditKey(event, '${a.id}')">
            <button onclick="saveAttrRename('${a.id}')">Save</button>
            <button onclick="deleteWithConfirm(this, 'attr', '${a.id}')">Del</button>
            <span class="close-x" onclick="cancelAttrEdit()">✕</span>
          </div>`;
        }
        return `<div class="meter-row" tabindex="0" data-type="attr" data-id="${a.id}"
                     onkeydown="handleMeterRowKey(event, 'attr', '${a.id}')"
                     onpointerdown="onMeterPointerDown(event, 'attr', '${a.id}')">
          <span class="meter-label meter-label-clickable" onclick="startAttrEdit('${a.id}')">${escapeHtml(a.name)}</span>
          <span class="meter-level">Lvl ${a.level}</span>
          <div class="meter-bar-bg"><div class="meter-bar-fill" style="width: ${pct}%; background: ${color};"></div></div>
          <span class="meter-text">(${a.xp_into_current_level}/${a.xp_for_current_level})</span>
        </div>`;
      }).join("");

      const addAttrRow = addingAttr
        ? `<div class="meter-edit">
            <input type="text" id="add-attr-name" placeholder="Attribute name..."
                   onkeydown="handleAddAttrKey(event)">
            <button onclick="saveNewAttr()">Add</button>
            <span class="close-x" onclick="cancelAttrAdd()">✕</span>
          </div>`
        : '';

      const attrMap = {};
      attributes.forEach(a => { attrMap[a.id] = a.name; });

      function attrDropdown(selectedId, idPrefix) {
        const options = [`<option value="">None</option>`]
          .concat(attributes.map(a =>
            `<option value="${a.id}" ${a.id === selectedId ? "selected" : ""}>${escapeHtml(a.name)}</option>`
          ));
        return `<select id="${idPrefix}-attr-select">${options.join("")}</select>`;
      }

      const skillRows = skills.map(s => {
        const attrIdx = s.attribute_id ? (attrIndexById[s.attribute_id] ?? -1) : -1;
        const color = attrFillColor(attrIdx);
        const pct = meterPercent(s.xp_into_current_level, s.xp_for_current_level);
        if (editingSkillId === s.id) {
          return `<div class="meter-edit">
            <input type="text" id="edit-skill-name" value="${escapeAttr(s.name)}"
                   onkeydown="handleSkillEditKey(event, '${s.id}')">
            ${attrDropdown(s.attribute_id, 'edit-skill')}
            <button onclick="saveSkillEdit('${s.id}')">Save</button>
            <button onclick="deleteWithConfirm(this, 'skill', '${s.id}')">Del</button>
            <span class="close-x" onclick="cancelSkillEdit()">✕</span>
          </div>`;
        }
        return `<div class="meter-row" tabindex="0" data-type="skill" data-id="${s.id}"
                     onkeydown="handleMeterRowKey(event, 'skill', '${s.id}')"
                     onpointerdown="onMeterPointerDown(event, 'skill', '${s.id}')">
          <span class="meter-label meter-label-clickable" onclick="startSkillEdit('${s.id}')">${escapeHtml(s.name)}</span>
          <span class="meter-level">Lvl ${s.level}</span>
          <div class="meter-bar-bg"><div class="meter-bar-fill" style="width: ${pct}%; background: ${color};"></div></div>
          <span class="meter-text">(${s.xp_into_current_level}/${s.xp_for_current_level})</span>
          <span class="char-row-attr">${escapeHtml(attrMap[s.attribute_id] || "")}</span>
        </div>`;
      }).join("");

      const addSkillRow = addingSkill
        ? `<div class="meter-edit">
            <input type="text" id="add-skill-name" placeholder="Skill name..."
                   onkeydown="handleAddSkillKey(event)">
            ${attrDropdown(null, 'add-skill')}
            <button onclick="saveNewSkill()">Add</button>
            <span class="close-x" onclick="cancelSkillAdd()">✕</span>
          </div>`
        : '';

      const accomplishmentRows = (!accomplishments || accomplishments.length === 0)
        ? '<div class="empty-state" style="font-size: 10px; color: #777;">No accomplishments yet.</div>'
        : accomplishments.map(a => `
          <div class="accomplishment-row">
            <div class="accomplishment-name">${escapeHtml(a.campaignName)}</div>
            <div class="accomplishment-detail">
              <span>${formatTimestamp(a.completedAt)}</span>
              ${a.bonusXp > 0 ? `<span style="color: #7a5500">+${a.bonusXp} XP</span>` : ''}
              <button class="del-x" onclick="deleteAccomplishment('${a.id}')">✕</button>
            </div>
          </div>
        `).join("");

      charContent.innerHTML = `
        <div style="display: flex; gap: 16px;">
          <div style="flex: 2;">
            <div class="char-header">
              ${nameHtml}
            </div>
            ${charMeter}
            <div class="char-section">
              <h2>Attributes <span class="add-x" tabindex="0" onclick="startAttrAdd()" onkeydown="if(event.key==='Enter'){event.preventDefault();startAttrAdd()}" style="font-size:11px">+</span></h2>
              ${attrRows}
              ${addAttrRow}
            </div>
            <div class="char-section">
              <h2>Skills <span class="add-x" tabindex="0" onclick="startSkillAdd()" onkeydown="if(event.key==='Enter'){event.preventDefault();startSkillAdd()}" style="font-size:11px">+</span></h2>
              ${skillRows}
              ${addSkillRow}
            </div>
          </div>
          <div style="flex: 1;">
            <div class="char-section">
              <h2>Accomplishments</h2>
              ${accomplishmentRows}
            </div>
          </div>
        </div>
      `;

      if (renamingChar) {
        const input = document.getElementById("char-name-input");
        if (input) { input.focus(); input.select(); }
      }
      if (editingAttrId) {
        const input = document.getElementById("edit-attr-name");
        if (input) { input.focus(); input.select(); }
      }
      if (addingAttr) {
        const input = document.getElementById("add-attr-name");
        if (input) input.focus();
      }
      if (editingSkillId) {
        const input = document.getElementById("edit-skill-name");
        if (input) { input.focus(); input.select(); }
      }
      if (addingSkill) {
        const input = document.getElementById("add-skill-name");
        if (input) input.focus();
      }
    }

      renamingChar = true;
      loadCharacterView();

    function toggleHistory(el) {

    // --- Meter row keyboard nav ---

    function handleMeterRowKey(e, type, id) {
      if (e.key === "e" || e.key === "E" || e.key === "Enter") {
        e.preventDefault();
        if (type === "attr") startAttrEdit(id);
        else startSkillEdit(id);
      } else if (e.key === "ArrowUp" && e.altKey) {
        e.preventDefault();
        moveMeterRow(type, id, -1);
      } else if (e.key === "ArrowDown" && e.altKey) {
        e.preventDefault();
        moveMeterRow(type, id, 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        focusAdjacentMeterRow(e.target, -1);
      } else if (e.key === "ArrowDown") {
        e.preventDefault();
        focusAdjacentMeterRow(e.target, 1);
      }
    }

    function focusAdjacentMeterRow(current, direction) {
      const rows = Array.from(charContent.querySelectorAll(".meter-row[tabindex]"));
      const idx = rows.indexOf(current);
      const target = rows[idx + direction];
      if (target) target.focus();
    }

    async function moveMeterRow(type, id, direction) {
      const list = type === "attr" ? cachedAttributes : cachedSkills;
      const ids = list.map(x => x.id);
      const idx = ids.indexOf(id);
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= ids.length) return;

      ids.splice(idx, 1);
      ids.splice(newIdx, 0, id);

      if (type === "attr") {
        await invoke("reorder_attributes", { attrIds: ids });
      } else {
        await invoke("reorder_skills", { skillIds: ids });
      }
      await loadCharacterView();
      const movedEl = charContent.querySelector(`[data-id="${id}"]`);
      if (movedEl) movedEl.focus();
    }

    let meterDragType = null;
    let meterDragId = null;
    let meterDragStartY = 0;
    let meterIsDragging = false;

    function onMeterPointerDown(e, type, id) {
      if (e.target.closest("button")) return;
      e.stopPropagation();
      meterDragType = type;
      meterDragId = id;
      meterDragStartY = e.clientY;
      meterIsDragging = false;

      const onMove = (me) => {
        if (!meterIsDragging && Math.abs(me.clientY - meterDragStartY) > 5) {
          meterIsDragging = true;
          document.body.classList.add("is-dragging");
          window.getSelection()?.removeAllRanges();
          const el = charContent.querySelector(`[data-id="${meterDragId}"]`);
          if (el) el.classList.add("dragging");
        }
        if (!meterIsDragging) return;

        charContent.querySelectorAll(".drop-above, .drop-below").forEach(el => {
          el.classList.remove("drop-above", "drop-below");
        });
        const target = getMeterDropTarget(meterDragType, me.clientY);
        if (target && target.id !== meterDragId) {
          const rect = target.el.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          target.el.classList.add(me.clientY < mid ? "drop-above" : "drop-below");
        }
      };

      const onUp = async (ue) => {
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);

        if (!meterIsDragging) { meterDragId = null; return; }

        const target = getMeterDropTarget(meterDragType, ue.clientY);
        charContent.querySelectorAll(".drop-above, .drop-below").forEach(el => {
          el.classList.remove("drop-above", "drop-below");
        });
        document.body.classList.remove("is-dragging");
        charContent.querySelectorAll(".dragging").forEach(el => el.classList.remove("dragging"));

        if (!target || target.id === meterDragId) { meterDragId = null; return; }

        const list = meterDragType === "attr" ? cachedAttributes : cachedSkills;
        const ids = list.map(x => x.id);
        const draggedIdx = ids.indexOf(meterDragId);
        if (draggedIdx === -1) { meterDragId = null; return; }

        const rect = target.el.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        let targetIdx = ids.indexOf(target.id);
        if (ue.clientY >= mid && targetIdx < draggedIdx) targetIdx++;
        if (ue.clientY < mid && targetIdx > draggedIdx) targetIdx--;

        const reordered = [...ids];
        reordered.splice(draggedIdx, 1);
        reordered.splice(targetIdx, 0, meterDragId);

        if (meterDragType === "attr") {
          await invoke("reorder_attributes", { attrIds: reordered });
        } else {
          await invoke("reorder_skills", { skillIds: reordered });
        }
        meterDragId = null;
        meterIsDragging = false;
        await loadCharacterView();
      };

      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    }

    function getMeterDropTarget(type, clientY) {
      const selector = `[data-type="${type}"]`;
      const items = Array.from(charContent.querySelectorAll(selector));
      for (const el of items) {
        const rect = el.getBoundingClientRect();
        if (clientY >= rect.top && clientY <= rect.bottom) {
          return { el, id: el.dataset.id };
        }
      }
      return null;
    }

    async function saveNewSkill() {
